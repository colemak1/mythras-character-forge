   +[["STR",c.STR,"Damage Mod",dmCalc(c.STR,c.SIZ)],
     ["CON",c.CON,"Healing Rate",healRate(c.CON)+(S.archetype!=="ordinary"?"×2":"")],
     ["SIZ",c.SIZ,"Damage Mod",dmCalc(c.STR,c.SIZ)],
     ["DEX",c.DEX,"Initiative",initBonus(c.INT,c.DEX)-initPenalty],
     ["INT",c.INT,"Action Points",apFinal(c.INT,c.DEX,S.fixedAP)],
     ["POW",c.POW,"Luck Points",luckFinal(c.POW)],
     ["CHA",c.CHA,"Exp. Mod",(xpMod(c.CHA)>=0?"+":"")+xpMod(c.CHA)]
    ].map(([nm,v,lk,lv])=>'<tr><td class="nm">'+nm+'</td><td class="vv">'+v+'</td><td class="lk">'+lk+'</td><td class="lv">'+lv+'</td></tr>').join("")
   +'</table></div>';
  h+='<div class="mbox"><div class="mbox-t">Attributes</div><table class="mchtable">'
   +[["Movement","6m"],["Magic Points",c.POW],["Action Points",apFinal(c.INT,c.DEX,S.fixedAP)],
     ["Damage Modifier",dmCalc(c.STR,c.SIZ)],["Initiative Bonus",initBonus(c.INT,c.DEX)-initPenalty],
     ["Healing Rate",healRate(c.CON)],["Luck Points",luckFinal(c.POW)],["Experience Mod.",(xpMod(c.CHA)>=0?"+":"")+xpMod(c.CHA)]
    ].map(([nm,v])=>'<tr><td class="nm" colspan="3">'+nm+'</td><td class="vv">'+v+'</td></tr>').join("")
   +'</table></div>';
  h+='<div class="mbox"><div class="mbox-t">Money &amp; Wealth</div>'
   +mkv("Starting",S.money.dice.length?moneyTotal()+" sp":"—")+mkv("Spent",(S.money.spent||0)+" sp")
   +mkv("Remaining",S.money.dice.length?(moneyTotal()-(S.money.spent||0))+" sp":"—")
   +mkv("Gear ENC",gearEncTotal())+mkv("Enc. limit (STR×2)",encLimit())+'</div>';
  h+='<div class="mbox mmagicbox"><div class="mbox-t">Magic Points</div><div class="mbig">'+c.POW+'</div></div>';
  h+='</div>'; // /mcol left

  h+='<div class="mcol">';
  h+='<div class="mbox"><div class="mbox-t">Hit Locations</div><div class="mhitloc-flex">'
   +'<table class="mtiny"><tr><th>d20</th><th>Loc</th><th class="num">HP</th><th class="num">AP</th></tr>'
   +HIT_D20.map(([r,loc])=>{const base=loc.replace(/Right |Left /,"Each ");
     return '<tr><td>'+r+'</td><td>'+loc+'</td><td class="num">'+hpAt(base)+'</td><td class="num">'+armorApAt(base)+'</td></tr>';}).join("")
   +'</table>'+bodyDiagramSvg()+'</div></div>';
  h+='<div class="mbox"><div class="mbox-t">Difficulty Grades</div><table class="mtiny">'
   +GRADES.map(([k,l])=>'<tr><td>'+l+'</td><td class="num">'+(GRADE_MULT[k]==null?(k==="automatic"?"no roll":"can&rsquo;t attempt"):(k==="standard"?"&mdash;":"&times;"+GRADE_MULT[k]))+'</td></tr>').join("")
   +'</table><p class="note" style="margin-top:4px">Current: <b>'+GRADE_LABEL[ACTIVE_GRADE]+'</b> (set on the Sheet controls above)</p></div>';
  h+='</div>'; // /mcol mid

  h+='<div class="mcol mskillscol"><div class="mbox mskillsbox"><div class="mbox-t">Skills</div>'
   +'<div class="mskillgrid">'
   +'<div><h4 class="msub">Standard</h4><div class="mskgrid">'+skrows(grp("Standard"))+'</div></div>'
   +'<div><h4 class="msub">Professional</h4><div class="mskgrid">'+(grp("Professional").length?skrows(grp("Professional")):'<span class="note">None yet.</span>')
     +(grp("Magic").length?'<h4 class="msub" style="margin-top:8px">Magic</h4><div class="mskgrid">'+skrows(grp("Magic"))+'</div>':"")
     +(grp("Combat Style").length?'<h4 class="msub" style="margin-top:8px">Combat Styles</h4><div class="mskgrid">'+skrows(grp("Combat Style"))+'</div>':"")+'</div></div>'
   +'</div></div></div>';
  h+='</div>'; // /mmain-grid

  // ---- weapons row ----
  h+='<div class="mweapons-grid">';
  const meleeWps=S.gearWeapons.map(n=>WEAPON_MAP[n]).filter(w=>w&&w.group!=="Ranged");
  const rangedWps=S.gearWeapons.map(n=>WEAPON_MAP[n]).filter(w=>w&&w.group==="Ranged");
  h+='<div class="mbox"><div class="mbox-t">Melee &amp; Shield Weapons</div>'
   +(meleeWps.length?'<table class="mtiny"><tr><th>Weapon</th><th>Damage</th><th>Reach</th><th>Effects</th><th class="num">ENC</th><th>AP/HP</th></tr>'
     +meleeWps.map(w=>'<tr><td>'+esc(w.name)+'</td><td class="num">'+esc(w.dmg)+'</td><td>'+esc(w.reach)+'</td><td>'+esc(w.effects)+'</td><td class="num">'+w.enc+'</td><td>'+esc(w.apHp)+'</td></tr>').join("")+'</table>'
     :'<p class="note">None carried &mdash; add some on the Money &amp; Gear step.</p>')+'</div>';
  h+='<div class="mbox"><div class="mbox-t">Ranged Weapons</div>'
   +(rangedWps.length?'<table class="mtiny"><tr><th>Weapon</th><th>Damage</th><th>Range</th><th>Effects</th><th class="num">ENC</th><th>AP/HP</th></tr>'
     +rangedWps.map(w=>'<tr><td>'+esc(w.name)+'</td><td class="num">'+esc(w.dmg)+'</td><td>'+esc(w.range||"—")+'</td><td>'+esc(w.effects)+'</td><td class="num">'+w.enc+'</td><td>'+esc(w.apHp)+'</td></tr>').join("")+'</table>'
     :'<p class="note">None carried.</p>')+'</div>';
  h+='</div>'; // /mweapons-grid

  if(S.inventory.length)h+='<div class="mbox" style="margin-top:8px"><div class="mbox-t">Other Equipment</div>'
   +S.inventory.map(it=>mkv(esc(it.name)+' ×'+it.qty,'ENC '+((it.qty||0)*(it.enc||0)))).join("")+'</div>';
  h+='</div>';
  h+='<div class="exportrow"><button class="nav" onclick="window.print()">Print sheet</button></div>';
  h+=rulesNotes();
  return h;
}
// Builder's final step. Used to be the dense "Sheet & Export" printout
// itself; now that Play Mode is where a finished character actually lives,
// this is just the closing action — campaign assignment/save (the one
// genuinely unfinished piece of business) plus a big "enter Play Mode"
// button. The full printable sheet moved to characterSheetBody(), one click
// away via "View / Print Sheet" here, from Play Mode, or from a My
// Characters card.
function stepFinish(){
  const careerName=S.customCareer.isCustom?S.customCareer.name:S.career;
  const meta=[S.culture,careerName,S.archetype!=="ordinary"?ARCHETYPES[S.archetype].label:null].filter(Boolean).join(" · ");
  let h=head("Finish Creating","That&rsquo;s the character built. Enter Play Mode to start using it at the table &mdash; you can always jump back into any step from the Edit button in Play Mode to make changes, nothing here is locked in.");
  h+='<div class="card"><h3>'+esc(S.concept.name||"Unnamed Character")+'</h3>'
   +(meta?'<p class="note">'+esc(meta)+'</p>':"")+'</div>';
  h+=campaignCard();
  h+='<div class="exportrow"><button class="nav primary" onclick="APP.toPlay()">&#9654; Finish Creating &mdash; Enter Play Mode</button>'
   +'<button class="nav" onclick="APP.toSheet(\'character\')">View / Print Sheet</button></div>';
  return h;
}
function campaignCard(){
  if(CLOUD_ENABLED&&!AUTH_USER&&!MOCK_AUTH){
    return '<div class="card"><h3>Campaign</h3><p class="note">Sign in from the Main Menu to link this character to a campaign and save it to your account.</p></div>';
  }
  if(CAMP_CACHE===null){loadCampaignsUnified();return '<div class="card"><h3>Campaign</h3><p class="note">Loading campaigns&hellip;</p></div>';}
  const camps=CAMP_CACHE;
  let h='<div class="card"><h3>Campaign</h3>';
  h+=fld("Assign to campaign",'<select onchange="APP.setCampaign(this.value)"><option value="">&mdash; none &mdash;</option>'
    +camps.map(c=>'<option value="'+esc(c.id)+'" '+(S.campaignId===c.id?"selected":"")+'>'+esc(c.name)+'</option>').join("")+'</select>');
  if(!camps.length)h+='<p class="note">No campaigns yet — create one from the Main Menu, then come back here to link this character.</p>';
  h+='<p style="margin-top:8px"><button class="nav" onclick="APP.saveToLibrary()">Save to Library</button> '
   +(S._libId?'<span class="note">Saved'+(cloudActive()?" to your account":" to this browser&rsquo;s library")+(S._libLastSaved?(" · "+new Date(S._libLastSaved).toLocaleTimeString()):"")+'</span>'
             :'<span class="note">Not yet saved'+(cloudActive()?" to your account":" to this browser&rsquo;s library")+' &mdash; Export JSON remains the durable, portable copy.</span>')+'</p>';
  h+='</div>';
  return h;
}
function rulesNotes(){
  return '<details class="rn"><summary>Rules notes &amp; audit trail</summary><div class="body"><ul>'
  +'<li>Attribute tables (Action Points, Damage Modifier, Experience Modifier, Healing Rate, Luck Points, Initiative, Hit Points per location, Humanoid Hit Location d20 table) checked against core pp.9&ndash;10 and p.109 page images. Damage Modifier&rsquo;s lowest band is &minus;1D8 (an earlier text-extraction pass had misread this as &minus;1D6).</li>'
  +'<li>Skill base formulas from the workbook character sheet and core skill chapter. <b>Quirk:</b> the workbook&rsquo;s allocation worksheet misprints Locale as DEX+POW and Perception as CHA+POW; the core rulebook and the workbook&rsquo;s own sheet give Locale INT&times;2 and Perception INT+POW &mdash; the core values are used here.</li>'
  +'<li><b>Quirk:</b> culture tables print the skill as &ldquo;Navigate&rdquo;; the skills chapter defines &ldquo;Navigation (INT+POW)&rdquo; &mdash; normalised to Navigation.</li>'
  +'<li>Culture: 100 points, every listed/chosen skill 5&ndash;15. Career: 100 points, max 15, &ldquo;not all of the available skills need to be improved.&rdquo; Bonus: 150 points, max 15, one hobby professional skill. Customs &amp; Native Tongue +40% each. All confirmed against the Character Creation Summary (core p.27) page image.</li>'
  +'<li>Passions starting values per the Passions Table (Culture &amp; Community, p.23), confirmed against the page image: a person (romantic/familial) 30 + loved one&rsquo;s POW+CHA; a person (platonic or averse) 30 + own POW + subject&rsquo;s CHA; an organisation, place or concept 30 + POW+INT; a race/species or an object 30 + POW&times;2.</li>'
  +'<li>Starting money per culture (Barbarian 4d6&times;50, Civilised 4d6&times;75, Nomadic 4d6&times;25, Primitive 4d6&times;10 silver) and the Social Class / Money Modifier tables (Culture &amp; Community, p.24, four per-culture tables: Barbarian, Civilised, Nomad, Primitive) are transcribed and confirmed against page images &mdash; no longer a reconstruction. The free-text Social Class field and Money Modifier number still let you override with a house rule if your table plays it differently.</li>'
  +'<li>Success tiers (Skills chapter, p.37&ndash;38, confirmed against page image): critical = one tenth of skill, fractions rounded up; 01&ndash;05 always succeeds; 96&ndash;00 always fails, regardless of skill value; fumble on 99&ndash;00, or only 00 for skills over 100. (Mythras has four tiers &mdash; no &ldquo;special&rdquo; tier.)</li>'
  +'<li>Weapons (Economics &amp; Equipment, pp.63&ndash;66: One-Handed, Shields, Two-Handed, Ranged tables) and Armour (p.58 Armour Table, 8 Construction tiers from Natural/Cured to Articulated Plate, plus the Material Types ENC-multiplier table) are transcribed and confirmed against page images. <b>Correction:</b> weapons have no STR/DEX minimum in Mythras &mdash; an earlier pass fabricated that mechanic entirely; it has been removed. Combat Style base % still uses STR+DEX for every style (marked with &#9888; on the sheet) as a working default, since the book leaves each style&rsquo;s exact base characteristics to the Games Master/setting.</li>'
  +'<li><b>Armour Penalty to Initiative</b> (p.58, confirmed against page image): total the ENC of every location of armour worn (full, not halved), divide by 5, round up, subtract from Initiative Bonus. Shown on the Sheet step next to Initiative and in the Armour card.</li>'
  +'<li><b>Quick Character</b> (Character Creation Workbook, Attribute Summary): a single 100-point pool spent across all Standard Skills, three chosen Professional Skills, and an optional Combat Style, replacing the Culture/Career/Bonus pipeline entirely. 5&ndash;15 points on any skill you invest in (0 is fine for the rest &mdash; with 20+ eligible skills, a mandatory 5 on literally every one wouldn&rsquo;t fit in 100 points). Characteristics still use the normal roll or 80-point build; there&rsquo;s no per-culture money multiplier in this mode, so enter one manually on the Money &amp; Gear step.</li>'
  +'<li><b>Pulp Hero &amp; Paragon</b> (Mythras Companion, &ldquo;Pyramids, Pulp, &amp; Paragons&rdquo;, pp.54&ndash;55, verified against page scans): different characteristic dice/point pools, 2 or 3 non-stacking Advantages, and extra Bonus Skill Points at a higher per-skill cap (Pulp +50 pts/20% cap, Paragon +100 pts/40% cap). <b>Quirk:</b> the book&rsquo;s Paragon bonus-points line is literally labelled &ldquo;Heroic characters&rdquo; rather than &ldquo;Paragon characters&rdquo; &mdash; preserved as printed.</li>'
  +'<li>Grade-easier Advantages (Endurance/Stealth/Willpower) are flagged on the Attributes step rather than converted into a flat percentage, since Mythras Grades are a situational roll modifier, not a skill bonus &mdash; baking in a number would be a guess, not a rule.</li>'
  +'<li>The doubled Healing Rate for Pulp/Paragon (Minor or Serious Wounds only, Major Wounds unaffected) is noted next to Healing Rate rather than computed, since this build doesn&rsquo;t track wound severity.</li>'
  +'<li><b>Difficulty Grade</b> (core rulebook, Skills chapter, p.38, confirmed against page image): Very Easy doubles the skill, Easy adds half again, Standard is unchanged, Hard cuts it by a third, Formidable halves it, Herculean drops it to a tenth; Automatic needs no roll and Hopeless allows none. The selector on the Sheet step applies this to every skill % and to the roll button. Rounding direction isn&rsquo;t specified in the book for this table, so results are rounded to the nearest whole percent.</li>'
  +'<li><b>Cult &amp; Community</b> (Cults &amp; Brotherhoods chapter, pp.196&ndash;200, confirmed against page images): the five organisation types (Theist Cult, Animist/Spirit Cult, Sorcery Order, Mystical Order, Brotherhood) and their rank titles &mdash; Common/Dedicated/Proven/Overseer/Leader &mdash; are the book&rsquo;s own, as are the per-rank Requirements (years of membership + a minimum number of cult skills at a minimum %) and Training Discount (0/25/50/75/100%). <b>Correction:</b> rank does not grant a flat skill % bonus &mdash; an earlier pass invented that mechanic; it has been removed. What stays intentionally setting-specific, per the book&rsquo;s own design (cults are meant to be campaign-defined), is which nine archetypes exist for Sit&#39;ota, their names/blurbs, and which skill each one teaches.</li>'
  +'<li><b>Encumbrance</b> (core rulebook, Encumbrance section, confirmed against page image): unencumbered up to STR&times;2. Over STR&times;2 (&ldquo;Burdened&rdquo;): STR/DEX-based skills, including Combat Styles, are one Grade harder, Movement &minus;2m, no sprinting. Over STR&times;3 (&ldquo;Overloaded&rdquo;): two Grades harder, Movement halved, walk-only. STR&times;4 is a hard cap &mdash; flagged but not blocked by this tool. Worn armour counts at half its packed ENC toward these totals; carried (unworn) armour counts full ENC.</li>'
  +'<li>Not modelled in v1: age bands, background events, magic spell lists.</li>'
  +'</ul></div></details>';
}

/* ================= APP HANDLERS ================= */
window.APP={
 go(i){if(i<0||i>=currentSteps().length)return;
   if(i>S.step){for(let s=S.step;s<i;s++){if(!stepPassed(s)){S.step=s;render();window.scrollTo(0,0);return;}}}
   S.step=i;render();window.scrollTo(0,0);},
 override(step,v){S.overrides[step]=v;render();},
 set(obj,f,v){S[obj][f]=v;renderLedger();},
 set2(f,v){S[f]=v;render();},
 /* characteristics */
 mode(m){S.charMode=m;
   if(m==="pb"){CHARS.forEach(c=>{const mn=(c==="INT"||c==="SIZ")?8:3;
     if(!Number.isFinite(S.chars[c]))S.chars[c]=mn;});}
   render();},
 rollPools(){
   const tier=ARCHETYPES[S.archetype], ord=S.archetype==="ordinary";
   const rollMain=()=>ord?(d(6)+d(6)+d(6)):(()=>{const dice=[d(6),d(6),d(6),d(6)].sort((a,b)=>a-b);return dice[1]+dice[2]+dice[3];})();
   const rollSizInt=()=>ord?(d(6)+d(6)+6):(()=>{const dice=[d(6),d(6),d(6)].sort((a,b)=>a-b);return dice[1]+dice[2]+6;})();
   S.poolA=Array.from({length:tier.mainRolls},rollMain);
   S.poolB=Array.from({length:tier.sizintRolls},rollSizInt);
   S.assignA={};S.assignB={};CHARS.forEach(c=>S.chars[c]=null);render();},
 assignInOrder(){
   const idxByValDesc=pool=>pool.map((v,i)=>i).sort((a,b)=>pool[b]-pool[a]);
   const orderA=idxByValDesc(S.poolA),orderB=idxByValDesc(S.poolB);
   S.assignA={};S.assignB={};
   ROLL_3D6.forEach((c,i)=>{if(i<orderA.length){S.assignA[c]=orderA[i];S.chars[c]=S.poolA[orderA[i]];}});
   ROLL_2D6.forEach((c,i)=>{if(i<orderB.length){S.assignB[c]=orderB[i];S.chars[c]=S.poolB[orderB[i]];}});
   render();},
 assign(c,idx){const isB=ROLL_2D6.includes(c);const asg=isB?S.assignB:S.assignA;const pool=isB?S.poolB:S.poolA;
   if(idx===""){delete asg[c];S.chars[c]=null;}
   else{asg[c]=+idx;S.chars[c]=pool[+idx];}
   render();},
 pb(c,dir){const mnOf=k=>(k==="INT"||k==="SIZ")?8:3;const mn=mnOf(c);
   const pool=ARCHETYPES[S.archetype].pbPoints;
   const cur=S.chars[c];
   // First "+" on an unset characteristic lands on its minimum, not min+1.
   const v=(cur==null)?(dir>0?mn:mn-1):cur+dir;
   if(v<mn||v>18)return;
   const otherReserved=CHARS.reduce((a,k)=>a+(k===c?0:(S.chars[k]??mnOf(k))),0);
   if(otherReserved+v>pool)return;
   S.chars[c]=v;render();},
 pbSet(c,target){const mnOf=k=>(k==="INT"||k==="SIZ")?8:3;
   const pool=ARCHETYPES[S.archetype].pbPoints;
   // Budget against the pool minus what every OTHER characteristic already
   // reserves — unset ones reserve their own minimum, not 0 — so clicking
   // "max"/"fill" on one stat can never push the total over the pool by
   // starving stats that haven't been touched yet. The pool ceiling always
   // wins here; it's never re-floored back up to mn afterward (that was the
   // bug: mn could be applied after the pool clamp and silently overspend).
   const otherReserved=CHARS.reduce((a,k)=>a+(k===c?0:(S.chars[k]??mnOf(k))),0);
   const avail=Math.max(0,pool-otherReserved);
   S.chars[c]=Math.max(0,Math.min(18,target,avail));
   render();},

 /* roller */
 roll(key){const em=entryMap();const e=em[key];if(!e)return;
   const base=finalPct(key);const g=gradedPct(key,base);
   if(g.pct===null){alert(g.grade==="automatic"?"Automatic — no roll needed, it just succeeds.":"Hopeless — no attempt can be made at this Grade.");return;}
   const pct=g.pct;const r=d100();
   const tag=g.grade!=="standard"?" ("+GRADE_LABEL[g.grade]+")":"";
   const tier=resolveRoll(r,pct);
   // Experience Rolls (core rulebook pp.71-73): a Fumble flags this skill
   // for a free +1% next time the player runs Improve Skills — automatic
   // here so nobody has to remember to mark it by hand. Critical does NOT
   // factor into Experience at all (verified against the book — a common
   // misconception carried over from other d100 games).
   if(tier==="Fumble"&&!S.xp.fumbled.includes(key))S.xp.fumbled.push(key);
   S.rollLog.unshift({label:e.label+tag,pct,roll:r===100?"00":r,tier,combat:key.startsWith("style:"),oppTier:null});
   S.rollLog=S.rollLog.slice(0,8);render();},

 /* ---- Experience Rolls / Improve Skills (core rulebook pp.71-73) ---- */

   render();},

 // roll happens to also be spent on that skill).
 xpApplyFumble(key){if(!S.xp.fumbled.includes(key))return;
   const e=entryMap()[key];if(!e)return;
   S.xp.bonus[key]=(S.xp.bonus[key]||0)+1;
   S.xp.fumbled=S.xp.fumbled.filter(k=>k!==key);
   S.xp.history.unshift({type:"fumble",key,label:e.label,newPct:finalPct(key)});
   S.xp.history=S.xp.history.slice(0,25);render();},
 // Spend one banked Experience Roll on a skill: 1d100 + INT vs current %
 // (equal-or-beat = +1d4+1%, otherwise still +1%). If the skill is flagged
 // Fumbled, that free +1% is applied first per the book, then the roll is
 // made against the now-updated %. One roll per skill per sitting.
 xpSpend(key){if(VIEW_ONLY||S.xp.pool<=0||S.xp.usedThisRun.includes(key))return;
   const e=entryMap()[key];if(!e)return;
   let fumbleApplied=false;
   if(S.xp.fumbled.includes(key)){
     S.xp.bonus[key]=(S.xp.bonus[key]||0)+1;
     S.xp.fumbled=S.xp.fumbled.filter(k=>k!==key);
     fumbleApplied=true;
   }
   const target=finalPct(key);
   const r=d100();const total=r+S.chars.INT;
   const success=total>=target;
   const gain=success?(d(4)+1):1;
   S.xp.bonus[key]=(S.xp.bonus[key]||0)+gain;
   S.xp.pool--;S.xp.usedThisRun.push(key);
   S.xp.history.unshift({type:"roll",key,label:e.label,roll:r===100?"00":r,int:S.chars.INT,total,target,success,gain,fumbleApplied,newPct:finalPct(key)});
   S.xp.history=S.xp.history.slice(0,25);render();},
 // On-demand Difficulty Grade reference popover (Play Mode). Deliberately
 // bypasses render() — it's transient UI state, not character state, so it's
 // built/positioned/torn down directly against the DOM rather than round-
 // tripping through the full re-render. A second click on the same %, a
 // click anywhere else, or Escape all close it.
 toggleGradePop(key,label,ev){
   ev.stopPropagation();
   const old=$("#gradePop");
   const wasThis=old&&old.dataset.key===key;
   if(old)APP._closeGradePop();
   if(wasThis)return;
   const rows=gradeRefRows(key);
   const cur=gradeForEntry(key);
   let h='<div class="pm-gradepop-hd">'+esc(label)+'</div><table>'
    +rows.map(r=>'<tr class="'+(r.g===cur?"cur":"")+'"><td class="g">'+esc(r.label)+'</td><td class="p">'+r.text+'</td></tr>').join("")
    +'</table>';
   if(cur!==ACTIVE_GRADE)h+='<div class="pm-gradepop-note">&#9733; This skill rolls one Grade easier than the Active Grade (Advantage) &mdash; highlighted row is what you actually use.</div>';
   const pop=document.createElement("div");
   pop.id="gradePop";pop.className="pm-gradepop";pop.dataset.key=key;
   pop.innerHTML=h;
   document.body.appendChild(pop);
   const r=ev.currentTarget.getBoundingClientRect();
   const pw=pop.offsetWidth,ph=pop.offsetHeight;
   let left=Math.min(r.left,window.innerWidth-pw-8);
   let top=r.bottom+6;
   if(top+ph>window.innerHeight-8)top=r.top-ph-6;
   pop.style.left=Math.max(8,left)+"px";
   pop.style.top=Math.max(8,top)+"px";
   setTimeout(()=>{
     document.addEventListener("click",APP._gradePopOutside);
     document.addEventListener("keydown",APP._gradePopEsc);
   },0);
 },
 _closeGradePop(){
   const pop=$("#gradePop");if(pop)pop.remove();
   document.removeEventListener("click",APP._gradePopOutside);
   document.removeEventListener("keydown",APP._gradePopEsc);

   if(hasUnsavedWork()&&!confirm("Importing will replace the character currently loaded. Continue?"))return;
   const f=$("#menuImportFile");f.onchange=()=>{const file=f.files[0];if(!file)return;
   const rd=new FileReader();rd.onload=()=>{try{const data=JSON.parse(rd.result);
     if(!data.chars||!data.concept)throw new Error("Not a Character Forge file");
     S=Object.assign(freshState(),data);normalizeState();APPVIEW="character";render();window.scrollTo(0,0);
   }catch(e){alert("Import failed: "+e.message);}};
   rd.readAsText(file);f.value="";};f.click();},
 /* my characters */
 toLibrary(){APPVIEW="library";LIB_CACHE=null;render();loadLibraryUnified();window.scrollTo(0,0);},
 openCharToPlay(id,opts){
   openCharUnified(id).then(async entry=>{if(!entry)return;S=Object.assign(freshState(),entry.state);normalizeState();
     S._libId=entry.id;S.campaignId=entry.campaignId;S._ownerId=entry.ownerId;
     const viewingOther=cloudActive()&&entry.ownerId!=null&&entry.ownerId!==AUTH_USER.id;
     VIEW_ONLY=viewingOther;
     VIEW_ONLY_IS_DM=viewingOther?await isDmOfCampaign(entry.campaignId):false;
     VIEW_ONLY_OWNER_NAME=(opts&&opts.ownerName)||null;
     PLAY_RETURN_VIEW=(opts&&opts.returnTo)||"menu";
     APPVIEW="play";XP_OPEN=false;render();window.scrollTo(0,0);});},
 openCharToEdit(id){
   openCharUnified(id).then(entry=>{if(!entry)return;S=Object.assign(freshState(),entry.state);normalizeState();
     S._libId=entry.id;S.campaignId=entry.campaignId;S._ownerId=entry.ownerId;
     APPVIEW="character";render();window.scrollTo(0,0);});},
 deleteLibChar(id,name){
   if(!confirm('Delete "'+name+'"? This can\'t be undone — Export JSON first if you want a copy.'))return;
   deleteCharUnified(id).then(()=>{LIB_CACHE=null;render();loadLibraryUnified();})
     .catch(e=>alert("Could not delete character: "+e.message));},
 /* account */
 toAccount(){APPVIEW="account";render();window.scrollTo(0,0);},
 mockSignIn(){
   const el=$("#mockName");const name=(el&&el.value&&el.value.trim())||"Test DM";
   MOCK_AUTH={id:"mock-"+genId(),display_name:name};
   CAMP_CACHE=null;render();},
 mockSignOut(){MOCK_AUTH=null;CAMP_CACHE=null;render();},
 /* campaigns */
 toCampaigns(){APPVIEW="campaigns";CAMP_CACHE=null;render();loadCampaignsUnified();window.scrollTo(0,0);},
 newCampaign(){
   if(CLOUD_ENABLED&&!AUTH_USER&&!MOCK_AUTH){alert("Sign in first — campaigns need an account once cloud sync is on.");return;}
   createCampaignUnified("New Campaign").then(camp=>{
     CURRENT_CAMPAIGN_ID=camp.id;APPVIEW="campaign";CAMPAIGN_VIEW=null;render();
     loadCampaignViewUnified(camp.id);window.scrollTo(0,0);
   }).catch(e=>alert("Could not create campaign: "+e.message));},
 openCampaign(id){CURRENT_CAMPAIGN_ID=id;APPVIEW="campaign";CAMPAIGN_VIEW=null;render();
   loadCampaignViewUnified(id);window.scrollTo(0,0);},
 campField(f,v){
   const camp=CAMPAIGN_VIEW&&CAMPAIGN_VIEW.campaign;if(!camp)return;
   camp[f]=v;render(); // optimistic — reflect the edit immediately
   const fn=f==="name"?renameCampaignUnified:noteCampaignUnified;
   fn(camp.id,v).catch(e=>alert("Could not save: "+e.message));},
 deleteCampaign(){
   const camp=CAMPAIGN_VIEW&&CAMPAIGN_VIEW.campaign;if(!camp)return;
   if(!confirm("Delete campaign \""+camp.name+"\"? Linked characters stay in place, just unassigned."))return;
   deleteCampaignUnified(camp.id).then(()=>{APPVIEW="campaigns";CAMP_CACHE=null;render();loadCampaignsUnified();})
     .catch(e=>alert("Could not delete campaign: "+e.message));},
 newCharacterForCampaign(){
   if(hasUnsavedWork()&&!confirm("Start a new character for this campaign? This clears the one currently loaded (autosave and exports are unaffected until overwritten)."))return;
   const cid=CURRENT_CAMPAIGN_ID;S=freshState();S.campaignId=cid;APPVIEW="character";render();window.scrollTo(0,0);},
 assignPicked(){
   const sel=$("#assignPicker");if(!sel||!sel.value)return;
   assignCharUnified(sel.value,CURRENT_CAMPAIGN_ID)
     .then(()=>loadCampaignViewUnified(CURRENT_CAMPAIGN_ID))
     .catch(e=>alert("Could not assign character: "+e.message));},
 openLibChar(id){
   if(hasUnsavedWork()&&!confirm("Open this character? This replaces what's currently loaded."))return;
   openCharUnified(id).then(entry=>{
     if(!entry)return;
     S=Object.assign(freshState(),entry.state);normalizeState();
     S._libId=entry.id;S.campaignId=entry.campaignId;S._ownerId=entry.ownerId;
     APPVIEW="character";render();window.scrollTo(0,0);
   }).catch(e=>alert("Could not open character: "+e.message));},
 unassignChar(id){
   unassignCharUnified(id).then(()=>loadCampaignViewUnified(CURRENT_CAMPAIGN_ID))
     .catch(e=>alert("Could not unassign character: "+e.message));},
 // DM detaching a PLAYER's character (not their own) from the campaign —
 // routes through the dm_unassign_character RPC, never a direct table
 // write. The DM can only do this, never delete the character outright.
 dmUnassignChar(id){
   if(!confirm("Unassign this character from the campaign? The character itself is untouched, just no longer linked here."))return;
   cloudDmUnassignCharacter(id).then(()=>loadCampaignViewUnified(CURRENT_CAMPAIGN_ID))
     .catch(e=>alert("Could not unassign character: "+e.message));},
 /* party board */
 toBoard(campaignId){
   if(campaignId)CURRENT_CAMPAIGN_ID=campaignId;
   APPVIEW="board";BOARD_CHARS=null;render();window.scrollTo(0,0);
   boardLoad(CURRENT_CAMPAIGN_ID);},
 refreshBoard(){if(CURRENT_CAMPAIGN_ID)boardRefetch(CURRENT_CAMPAIGN_ID);},
 boardOpenChar(id,ownerName){
   APP.openCharToPlay(id,{ownerName:ownerName||null,returnTo:"board"});},
 setCampaign(id){S.campaignId=id||null;render();},
 saveToLibrary(){
   saveToLibraryUnified().then(()=>{S._libLastSaved=Date.now();render();})
     .catch(e=>alert("Could not save to library: "+e.message));},
 joinCampaign(){
   const el=$("#joinCode");const code=el&&el.value&&el.value.trim();
   if(!code)return;
   cloudJoinCampaign(code).then(res=>{
     if(!res){alert("Invalid invite code.");return;}
     CURRENT_CAMPAIGN_ID=res.id;APPVIEW="campaign";CAMPAIGN_VIEW=null;render();
     loadCampaignViewUnified(res.id);window.scrollTo(0,0);
   }).catch(e=>alert("Could not join campaign: "+e.message));},
 /* account */
 signIn(){
   const email=($("#authEmail")&&$("#authEmail").value||"").trim();
   const pw=$("#authPw")&&$("#authPw").value||"";
   if(!email||!pw){alert("Enter your email and password.");return;}
   sb.auth.signInWithPassword({email,password:pw}).then(({error})=>{
     if(error)alert("Sign-in failed: "+error.message);
   });},
 signUp(){
   const email=($("#authEmail")&&$("#authEmail").value||"").trim();
   const pw=$("#authPw")&&$("#authPw").value||"";
   if(!email){alert("Enter your email first.");return;}
   if(pw.length<8){alert("Password must be at least 8 characters.");return;}
   sb.auth.signUp({email,password:pw,options:{emailRedirectTo:window.location.href}}).then(({data,error})=>{
     if(error){alert("Sign-up failed: "+error.message);return;}
     // If email confirmation is required, Supabase returns a user but no
     // session yet — nothing to do here but wait; onAuthStateChange fires
     // once they click the confirmation link. If confirmation is off,
     // data.session is already populated and onAuthStateChange fires
     // immediately on its own.
     if(!data.session){AUTH_PENDING="signup";render();}
   });},
 forgotPassword(){
   const email=($("#authEmail")&&$("#authEmail").value||"").trim();
   if(!email){alert("Enter your email first.");return;}
   sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href}).then(({error})=>{
     alert(error?("Could not send reset email: "+error.message):"Reset email sent — check your inbox.");
   });},
 setNewPassword(){
   const pw=$("#authNewPw")&&$("#authNewPw").value||"";
   if(pw.length<8){alert("Password must be at least 8 characters.");return;}
   sb.auth.updateUser({password:pw}).then(({error})=>{
     if(error){alert("Could not set new password: "+error.message);return;}
     AUTH_RECOVERY=false;alert("Password updated.");render();
   });},
 sendMagicLink(fieldId){
   const el=$("#"+(fieldId||"authEmail"));const email=el&&el.value&&el.value.trim();
   if(!email){alert("Enter your email first.");return;}
   sb.auth.signInWithOtp({email,options:{emailRedirectTo:window.location.href}}).then(({error})=>{
     if(error){alert("Could not send link: "+error.message);return;}
     AUTH_PENDING=true;render();
   });},
 setDisplayName(){
   const el=$("#authName");const name=el&&el.value&&el.value.trim();
   if(!name)return;
   ensureProfile(name).then(render).catch(e=>alert("Could not save name: "+e.message));},
 signOut(){sb.auth.signOut().then(()=>{AUTH_USER=null;AUTH_PROFILE=null;AUTH_PENDING=false;CAMP_CACHE=null;APPVIEW="menu";render();});}
};
function dl(name,content,type){const b=new Blob([content],{type});const u=URL.createObjectURL(b);
  const a=document.createElement("a");a.href=u;a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(u),2000);}
function buildMD(){
  const c=S.chars,n=S.concept.name||"Unnamed Character";
  const es=allEntries();
  const careerName=S.customCareer.isCustom?S.customCareer.name:S.career||"";
  const yaml=["---","type: character","name: "+n,
   "culture: "+(S.culture||""),"career: "+careerName,
   ...(S.cultMembership.archetype?["cult: "+(S.cultMembership.name||cultArch().name)+" ("+cultRankTitle(cultArch(),S.cultMembership.rank)+")"]:[]),
   "social_class: "+(S.money.socialClass||""),
   "tier: "+S.archetype,
   ...(S.archetype!=="ordinary"&&S.archAdvantages.length?["advantages: "+S.archAdvantages.join(", ")]:[]),
   ...CHARS.map(k=>k.toLowerCase()+": "+(c[k]??"")),
   "action_points: "+(charsReady()?apFinal(c.INT,c.DEX,S.fixedAP):""),
   "damage_modifier: \""+(charsReady()?dmCalc(c.STR,c.SIZ):"")+"\"",
   "initiative: "+(charsReady()?(initBonus(c.INT,c.DEX)-armourPenaltyToInit()):""),
   "luck_points: "+(charsReady()?luckFinal(c.POW):""),
   "magic_points: "+(charsReady()?c.POW:""),
   "healing_rate: "+(charsReady()?healRate(c.CON):""),
   "movement: 6m","tags:","  - character","---"].join("\n");
  let md=yaml+"\n\n# "+n+"\n\n";
  if(S.concept.homeland)md+="*"+[S.culture,S.career,S.concept.homeland].filter(Boolean).join(" · ")+"*\n\n";
  if(charsReady()){
    md+="## Characteristics\n\n| "+CHARS.join(" | ")+" |\n|"+CHARS.map(()=>"---").join("|")+"|\n| "+CHARS.map(k=>c[k]).join(" | ")+" |\n\n";
    md+="## Hit Locations\n\n| d20 | Location | HP | AP |\n|---|---|---|---|\n"
      +HIT_D20.map(([r,loc])=>{const base=loc.replace(/Right |Left /,"").replace("Arm","Each Arm").replace("Leg","Each Leg");
        const hp=hpLocsFinal(c.CON,c.SIZ).find(x=>x[0]===base);return "| "+r+" | "+loc+" | "+(hp?hp[1]:"")+" | "+armorApAt(base)+" |";}).join("\n")+"\n\n";
  }
  const grp=(g,t)=>{const list=es.filter(e=>e.grp===g).sort((a,b)=>a.label.localeCompare(b.label));
    if(!list.length)return "";
    return "## "+t+"\n\n| Skill | % |\n|---|---|\n"+list.map(e=>"| "+e.label+" | "+finalPct(e.key)+"% |").join("\n")+"\n\n";};
  md+=grp("Standard","Standard Skills")+grp("Professional","Professional Skills")+grp("Magic","Magic Skills")+grp("Combat Style","Combat Styles");
  if(S.passions.length)md+="## Passions\n\n| Passion | % |\n|---|---|\n"+S.passions.map(p=>"| "+(p.name||"(unnamed)")+" | "+passionVal(p)+"% |").join("\n")+"\n\n";
  if(S.gearWeapons.length)md+="## Weapons\n\n| Weapon | Damage | Reach | Effects | ENC | AP/HP |\n|---|---|---|---|---|---|\n"
    +S.gearWeapons.map(nm=>{const w=WEAPON_MAP[nm];return w?"| "+w.name+" | "+w.dmg+" | "+w.reach+" | "+w.effects+" | "+w.enc+" | "+w.apHp+" |":"";}).filter(Boolean).join("\n")+"\n\n";
  md+="## Armour\n\n| Location | Construction | AP |\n|---|---|---|\n"+ARMOR_LOCATIONS.map(l=>"| "+l+" | "+S.armor[l]+" | "+armorApAt(l)+" |").join("\n")
    +"\n\nArmour Penalty to Initiative: -"+armourPenaltyToInit()+"\n\n";
  if(S.money.dice.length)md+="## Money\n\nStarting: "+moneyTotal()+" sp — remaining: "+(moneyTotal()-(S.money.spent||0))+" sp\n\n";
  if(S.inventory.length)md+="## Equipment\n\n"+S.inventory.map(it=>"- "+it.name+" ×"+it.qty+" (ENC "+((it.qty||0)*(it.enc||0))+")").join("\n")+"\n\n";
  if(S.concept.notes)md+="## Notes\n\n"+S.concept.notes+"\n";
  return md;
}

render();
