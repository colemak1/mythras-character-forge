// Real Supabase primary keys are UUIDs; the local-only library instead uses
// genId() (timestamp+random, no dashes) — the two formats never collide, so
// this is a safe, cheap way to tell whether S._libId (if set at all) is
// actually a cloud row id or just a leftover from local/offline use before
// ever signing in. Without this check, a stale local-format id sitting in
// S._libId would make cloudUpsertCharacter take the UPDATE path against a
// row that was never created, and the character would never actually reach
// the cloud at all (silently — the debounced push swallows the error).
function isUuid(s){return typeof s==="string"&&/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);}
async function saveToLibraryUnified(){
  if(cloudActive()){
    const saved=await cloudUpsertCharacter({
      id:isUuid(S._libId)?S._libId:undefined,campaignId:S.campaignId||null,name:S.concept.name||"Unnamed Character",
      tier:S.archetype,culture:S.culture||"",
      career:(S.customCareer&&S.customCareer.isCustom?S.customCareer.name:S.career)||"",
      state:JSON.parse(JSON.stringify(S))});
    S._libId=saved.id;return saved;
  }
  return saveCurrentToLibraryLocal();
}
async function unassignCharUnified(id){
  if(cloudActive()){const {error}=await sb.from("characters").update({campaign_id:null}).eq("id",id);if(error)throw error;return;}
  const lib=loadCharLibLocal();const e=lib.find(c=>c.id===id);if(!e)return;e.campaignId=null;saveCharLibListLocal(lib);
}
async function assignCharUnified(id,campaignId){
  if(cloudActive()){const {error}=await sb.from("characters").update({campaign_id:campaignId}).eq("id",id);if(error)throw error;return;}
  const lib=loadCharLibLocal();const e=lib.find(c=>c.id===id);if(!e)return;e.campaignId=campaignId;saveCharLibListLocal(lib);
}
async function openCharUnified(id){
  // Returns campaignId/ownerId straight from the DB row (or the local
  // library entry), NOT from whatever was embedded in the saved state blob
  // at last-save time — the blob can be stale if a DM unassigned/reassigned
  // the character since then, and blindly trusting it would silently undo
  // that change on the next save.
  if(cloudActive()){
    const {data,error}=await sb.from("characters").select("*").eq("id",id).maybeSingle();
    if(error||!data)return null;
    return {id:data.id,name:data.name,state:data.state,campaignId:data.campaign_id||null,ownerId:data.owner_id};
  }
  const entry=loadCharLibLocal().find(c=>c.id===id);
  return entry?{id:entry.id,name:entry.name,state:entry.state,campaignId:entry.campaignId||null,ownerId:"local"}:null;
}
async function deleteCharUnified(id){
  if(cloudActive()){const {error}=await sb.from("characters").delete().eq("id",id);if(error)throw error;return;}
  saveCharLibListLocal(loadCharLibLocal().filter(c=>c.id!==id));
}
let CLOUD_PUSH_TIMER=null;
// Debounced cloud sync — this is what makes Play Mode changes (damage taken,
// AP spent, Luck burned...) actually reach the DM's live Party Board instead
// of staying trapped in localStorage. Fires ~1.5s after the last edit so a
// flurry of clicks in a single combat round doesn't turn into a network
// request per click; the Party Board's own realtime subscription then picks
// up the change and refetches. Never fires for a VIEW_ONLY session (someone
// looking at a teammate's sheet from the board) or before the character has
// ever been saved once (no S._libId yet to update).
function scheduleCloudPush(){
  if(!cloudActive()||!S._libId||VIEW_ONLY)return;
  clearTimeout(CLOUD_PUSH_TIMER);
  CLOUD_PUSH_TIMER=setTimeout(()=>{saveToLibraryUnified().catch(e=>console.warn("cloud sync",e));},1500);
}
let DM_INV_PUSH_TIMER=null;
// Separate debounced push for the DM-editing-a-player's-inventory case.
// scheduleCloudPush() above deliberately never fires under VIEW_ONLY (the DM
// has no general write access), so a loot-drop edit needs its own path that
// goes through the scoped dm_update_character_inventory RPC instead of the
// normal owner upsert.
function scheduleDmInventoryPush(){
  if(!cloudActive()||!S._libId||!VIEW_ONLY_IS_DM)return;
  clearTimeout(DM_INV_PUSH_TIMER);
  DM_INV_PUSH_TIMER=setTimeout(()=>{
    cloudDmUpdateCharacterInventory(S._libId,S.inventory).catch(e=>console.warn("dm inventory sync",e));
  },1500);
}
function saveAutosave(){
  try{localStorage.setItem(AUTOSAVE_KEY,JSON.stringify({S,ts:Date.now()}));}catch(e){/* storage unavailable — silently skip */}
  // Also keep the character library (mythrasForgeCharLib_v1) in sync on
  // every autosave, not just on an explicit "Save to Library" click. The
  // library already existed as infrastructure for Campaigns, but until now
  // a character only showed up in it if you remembered to save it there —
  // "My Characters" needs every character that's ever been worked on to
  // actually be there, matching what autosave already implies. Gated on
  // hasUnsavedWork() so a blank just-opened "New Character" doesn't spam
  // the library with empty placeholder entries.
  // Only do this LOCAL mirror when signed out — under cloud mode it's not
  // just redundant, it's actively harmful: saveCurrentToLibraryLocal()
  // assigns S._libId := genId() the very first time it runs on a brand-new
  // character (since S._libId starts undefined), and that non-UUID id would
  // then sit in S._libId *before* any real cloud save has ever happened.
  // isUuid() in saveToLibraryUnified guards against that id being trusted as
  // a real row id, but it's still cleaner not to manufacture it in the first
  // place — cloud mode has its own real source of truth (the debounced push
  // below, plus the explicit "Save to Library" button).
  if(!cloudActive()&&hasUnsavedWork()){try{saveCurrentToLibraryLocal();}catch(e){/* best-effort */}}
  scheduleCloudPush();
  scheduleDmInventoryPush();
  updateAutosaveTag();
}
function updateAutosaveTag(){
  const el=$("#autosaveTag");if(!el)return;
  try{const raw=localStorage.getItem(AUTOSAVE_KEY);
    if(raw){const t=JSON.parse(raw).ts;el.textContent="autosaved "+new Date(t).toLocaleTimeString()+" (click to clear)";el.onclick=APP.clearAutosave;el.style.cursor="pointer";}
    else{el.textContent="";el.onclick=null;el.style.cursor="";}
  }catch(e){el.textContent="";}
}

/* ================= PARTY BOARD (live DM dashboard) =================
   A read-mostly view over every character linked to a campaign, live-
   updated via a Supabase realtime subscription on public.characters. Each
   card is driven off charVitals(row.state) — the exact same pure function
   Play Mode itself uses — so the board can never show a different wound
   tier or HP total than the character's own Play Mode screen would. */
let BOARD_CHARS=null;          // array of {id,name,tier,culture,career,owner_id,owner_name,campaign_id,state,updated_at}, or null while loading
let BOARD_SUB=null,BOARD_LIVE=false;
let BOARD_REFETCH_TIMER=null,BOARD_TICK_TIMER=null,BOARD_POLL_TIMER=null;
// Cloud rows already carry `state` + owner_name from cloudFetchCharacters();
// local/mock characters need the same shape synthesized from the raw
// library entry so boardCardHTML() never has to branch on cloud vs. local.
async function loadBoardUnified(campaignId){
  if(cloudActive())return await cloudFetchCharacters({campaignId:campaignId});
  return charsInCampaignLocal(campaignId).map(c=>({id:c.id,name:c.name,tier:c.tier,culture:c.culture,career:c.career,
    owner_id:"local",owner_name:"You",campaign_id:c.campaignId,state:c.state,updated_at:new Date(c.savedAt).toISOString()}));
}
function boardVisHandler(){if(document.visibilityState==="visible"&&APPVIEW==="board"&&CURRENT_CAMPAIGN_ID)boardRefetch(CURRENT_CAMPAIGN_ID);}
function boardSubscribe(campaignId){
  boardUnsubscribeChannel();
  if(!cloudActive())return; // realtime multiplayer only makes sense signed in
  BOARD_SUB=sb.channel("board-"+campaignId)
    .on("postgres_changes",{event:"*",schema:"public",table:"characters",filter:"campaign_id=eq."+campaignId},
        ()=>boardRefetch(campaignId))
    .subscribe(status=>{BOARD_LIVE=(status==="SUBSCRIBED");if(APPVIEW==="board")render();});
}
function boardUnsubscribeChannel(){if(BOARD_SUB){sb.removeChannel(BOARD_SUB);BOARD_SUB=null;}BOARD_LIVE=false;}
// Full teardown — called by render() the instant APPVIEW leaves "board".
function boardUnsubscribe(){
  boardUnsubscribeChannel();
  clearTimeout(BOARD_REFETCH_TIMER);
  if(BOARD_TICK_TIMER){clearInterval(BOARD_TICK_TIMER);BOARD_TICK_TIMER=null;}
  if(BOARD_POLL_TIMER){clearInterval(BOARD_POLL_TIMER);BOARD_POLL_TIMER=null;}
  document.removeEventListener("visibilitychange",boardVisHandler);
}
// Realtime delivers a row-changed *signal*, not trusted payload data (a
// character's `state` jsonb can be large) — always refetch the full list
// over REST, debounced so a burst of near-simultaneous edits collapses into
// one request instead of one per event.
function boardRefetch(campaignId){
  clearTimeout(BOARD_REFETCH_TIMER);
  BOARD_REFETCH_TIMER=setTimeout(async()=>{
    BOARD_CHARS=await loadBoardUnified(campaignId);
    BOARD_LAST_FETCH=Date.now();
    if(APPVIEW==="board")render();
  },300);
}
let BOARD_LAST_FETCH=null;
async function boardLoad(campaignId){
  BOARD_CHARS=await loadBoardUnified(campaignId);
  BOARD_LAST_FETCH=Date.now();
  if(APPVIEW==="board")render();
  boardSubscribe(campaignId);
  document.addEventListener("visibilitychange",boardVisHandler);
  BOARD_TICK_TIMER=setInterval(()=>{if(APPVIEW==="board")render();},15000); // just to refresh the "updated Ns ago" ticker text
  if(cloudActive())BOARD_POLL_TIMER=setInterval(()=>boardRefetch(campaignId),60000); // backstop in case a realtime event is ever missed (e.g. the unassign-drops-out-of-filter edge case)
}
function timeAgo(ts){
  const s=Math.max(0,Math.round((Date.now()-ts)/1000));
  if(s<5)return "just now";
  if(s<60)return s+"s ago";
  const m=Math.round(s/60);if(m<60)return m+"m ago";
  return Math.round(m/60)+"h ago";
}
const BOARD_RANK={ok:0,serious:1,major:2};
const BOARD_TAG={ok:"OK",serious:"Serious",major:"Major"};

  const camp=CAMPAIGN_VIEW&&CAMPAIGN_VIEW.campaign;
  let h='<div class="menuwrap pb-wrap">';
  h+='<p><button class="nav" onclick="APP.openCampaign(\''+(CURRENT_CAMPAIGN_ID||"")+'\')">&#8592; '+(camp?esc(camp.name):"Campaign")+'</button> '

  if(!BOARD_CHARS.length){h+='<p class="note" style="text-align:center">No characters linked to this campaign yet.</p></div>';return h;}
  const sorted=BOARD_CHARS.slice().sort((a,b)=>{
    const ra=BOARD_RANK[charVitals(a.state).worst],rb=BOARD_RANK[charVitals(b.state).worst];
    return rb-ra||(a.name||"").localeCompare(b.name||"");
  });
  h+='<div class="pb-grid">'+sorted.map(boardCardHTML).join("")+'</div>';
  h+='</div>';
  return h;

/* ================= RENDER: FRAME ================= */
function render(){
  // The Difficulty Grade popover lives outside #main (see toggleGradePop),
  // so it isn't wiped by the innerHTML rebuild below — close it explicitly
  // on every render so it can never go stale against whatever just changed
  // (e.g. a dropdown onchange that fires without a bubbling document click).
  if($("#gradePop"))APP._closeGradePop();
  // Party Board runs a realtime subscription + a couple of timers for as
  // long as it's on screen — tear all of that down the instant navigation
  // moves anywhere else, so a stale subscription never keeps polling/pushing
  // renders after the user has left the page.
  if(APPVIEW!=="board")boardUnsubscribe();
  if(APPVIEW==="menu"){renderMenuView();return;}
  if(APPVIEW==="library"){renderLibraryView();return;}
  if(APPVIEW==="account"){renderAccountView();return;}
  if(APPVIEW==="campaigns"){renderCampaignsView();return;}
  if(APPVIEW==="campaign"){renderCampaignView();return;}
  if(APPVIEW==="board"){renderBoardView();return;}
  if(APPVIEW==="play"){renderPlayView();saveAutosave();return;}
  if(APPVIEW==="sheet"){renderSheetView();return;}
  document.body.classList.remove("menu-mode","play-mode");
  renderRail();renderMain();renderLedger();renderFoot();saveAutosave();
  document.title=(S.concept.name?S.concept.name+" — ":"")+"Mythras Character Forge";}

  +fld("Handedness",'<select onchange="APP.set(\'concept\',\'handed\',this.value)">'+["Right","Left","Ambidextrous"].map(o=>'<option '+(c.handed===o?"selected":"")+'>'+o+'</option>').join("")+'</select>')
  +fld("Body frame",'<select onchange="APP.set(\'concept\',\'frame\',this.value)">'+["Lithe","Medium","Heavy"].map(o=>'<option '+(c.frame===o?"selected":"")+'>'+o+'</option>').join("")+'</select>')

function stepChars(){

     ?"&ldquo;3d6 for STR, CON, DEX, POW and CHA. 2d6+6 for INT and SIZ. Allocate results to fit the concept. Results may be allocated in the order listed, or distributed as the Games Master and players agree.&rdquo;"

    +'<div class="charrow" style="margin-top:12px">'
    +CHARS.map(c=>{
      const isB=ROLL_2D6.includes(c);const pool=isB?S.poolB:S.poolA;const asg=isB?S.assignB:S.assignA;
      const opts=['<option value="">&mdash;</option>'].concat(pool.map((v,i)=>{
        const used=Object.entries(asg).some(([cc,ii])=>ii===i&&cc!==c);
        return '<option value="'+i+'" '+(asg[c]===i?"selected":"")+(used?" disabled":"")+'>'+v+'</option>';}));
      return '<div class="charbox"><div class="cname">'+c+'</div><div class="cval">'+(S.chars[c]??"&mdash;")+'</div><select onchange="APP.assign(\''+c+'\',this.value)">'+opts.join("")+'</select></div>';
    }).join("")+'</div></div>';

    body='<div class="card"><h3>Points build &mdash; '+pool+' points</h3>'
    +'<div class="rulequote">'+(isOrd
      ?"&ldquo;Alternatively distribute 80 points amongst the characteristics. Minimum 3 (8 for INT and SIZ), maximum 18. Use all the points.&rdquo;"
      :"&ldquo;If using the Points Build method, players build their character from a pre-set pool of "+pool+" points.&rdquo; &mdash; Mythras Companion")+'</div>'
    +'<div class="pool"><span>Points</span><span class="pv '+(total===pool?"ok":(total>pool?"bad":""))+'">'+total+' / '+pool+'</span>'
     +'<div class="pbar"><i style="width:'+Math.min(100,total/pool*100)+'%"></i></div><span class="note">'+(pool-total)+' left</span></div>'
    +'<div class="charrow" style="margin-top:10px">'+CHARS.map(c=>{
      const mn=(c==="INT"||c==="SIZ")?8:3;
      return '<div class="charbox"><div class="cname">'+c+'</div><div class="cval">'+(S.chars[c]??"&mdash;")+'</div><div class="cctl"><button aria-label="decrease '+c+'" onclick="APP.pb(\''+c+'\',-1)">&minus;</button><button aria-label="increase '+c+'" onclick="APP.pb(\''+c+'\',1)">+</button></div>'
       +'<div class="cctl" style="margin-top:3px"><button class="chip actionchip" onclick="APP.pbSet(\''+c+'\','+mn+')">min</button><button class="chip actionchip" onclick="APP.pbSet(\''+c+'\',18)">max</button></div></div>';
    }).join("")+'</div></div>';
  }else{
    body='<div class="card"><h3>Manual entry</h3><p class="note">For pre-rolled or GM-supplied values. Human range is normally 3&ndash;18 (INT and SIZ 8&ndash;18).</p>'
    +'<div class="charrow" style="margin-top:10px">'+CHARS.map(c=>'<div class="charbox"><div class="cname">'+c+'</div><input type="number" min="1" max="21" value="'+(S.chars[c]??"")+'" onchange="APP.manual(\''+c+'\',this.value)"></div>').join("")+'</div></div>';
  }
  return head("Characteristics","Seven characteristics drive everything downstream &mdash; attributes, skill bases and hit points all cascade from these.")
  +'<div class="modeseg">'
  +'<button class="'+(S.charMode==="roll"?"on":"")+'" onclick="APP.mode(\'roll\')">Roll dice</button>'
  +'<button class="'+(S.charMode==="pb"?"on":"")+'" onclick="APP.mode(\'pb\')">Points build ('+tier.pbPoints+')</button>'
  +'<button class="'+(S.charMode==="manual"?"on":"")+'" onclick="APP.mode(\'manual\')">Manual</button>'
  +'</div>'+body;
}

function advCard(){

   +ADVANTAGE_DEFS.map(a=>{
     const label=a.label(S.archetype);
     const checked=S.archAdvantages.includes(a.key);

     return '<label style="display:block;margin:4px 0"><input type="checkbox" '+(checked?"checked":"")+' '+(disabled?"disabled":"")+' onchange="APP.toggleAdv(\''+a.key+'\')"> '+label+'</label>';
   }).join("")+'</div>';
}

   ["Damage Modifier",dmCalc(c.STR,c.SIZ),"STR+SIZ = "+(c.STR+c.SIZ)],
   ["Experience Modifier",(xpMod(c.CHA)>=0?"+":"")+xpMod(c.CHA),"CHA "+c.CHA],

   ["Initiative Bonus",initBonus(c.INT,c.DEX),"average of DEX &amp; INT, fractions up"],

  +'<p class="note" style="margin-top:10px"><b>Optional rule &mdash; Fixed Action Points:</b> &ldquo;all characters can start the game with either 2 or 3 Action Points, regardless of INT and DEX.&rdquo; '
  +'<label><input type="radio" name="fap" '+(S.fixedAP===0?"checked":"")+' onchange="APP.fap(0)"> off</label> '
  +'<label><input type="radio" name="fap" '+(S.fixedAP===2?"checked":"")+' onchange="APP.fap(2)"> 2</label> '
  +'<label><input type="radio" name="fap" '+(S.fixedAP===3?"checked":"")+' onchange="APP.fap(3)"> 3</label></p></div>'
  +advCard()
  +(S.archetype!=="ordinary"&&(hasAdv("endurance")||hasAdv("stealth")||hasAdv("willpower"))
    ?'<div class="card"><h3>Grade-easier Advantages</h3><p class="note">'
     +["endurance","stealth","willpower"].filter(hasAdv).map(k=>k[0].toUpperCase()+k.slice(1)).join(", ")
     +' rolls are one Grade easier for this character. Grades are a situational roll modifier in Mythras, not a skill bonus, so this isn&rsquo;t folded into the % shown below &mdash; apply it at the table when the roll comes up.</p></div>'
    :"")
  +'<div class="card"><h3>Hit Points per Location</h3><p class="note">CON+SIZ = '+(c.CON+c.SIZ)+'. Locations rolled on 1d20 in play.'+(hasAdv("hp")?' Includes the Advantage bonus below.':"")+'</p>'
  +'<table class="rt"><tr><th>d20</th><th>Location</th><th class="num">HP</th></tr>'
  +HIT_D20.map(([r,loc])=>{const base=loc.replace(/Right |Left /,"").replace("Arm","Each Arm").replace("Leg","Each Leg");
    const hp=hpLocsFinal(c.CON,c.SIZ).find(x=>x[0]===base||x[0]===loc);
    return '<tr><td>'+r+'</td><td>'+loc+'</td><td class="num">'+(hp?hp[1]:"")+'</td></tr>';}).join("")
  +'</table></div>';
}
/* ---- shared allocation table ---- */
function allocTable(phase,rows,pool,min,max,quote,groupOrder){
  const spent=aSum(phase),rem=pool-spent;
  const seen=new Set();rows=rows.filter(r=>!seen.has(r.key)&&seen.add(r.key));
  // Optional section grouping (Standard/Professional/Magic/Combat Style) —
  // used on the Bonus Skills step, which otherwise dumps 25+ rows into one
  // flat alphabetical list with no way to tell what kind of skill you're
  // looking at. Stable-sorts rows into groupOrder, then inserts a labelled
  // header row wherever the group changes. Culture/Career/Quick callers
  // don't pass groupOrder, so they render exactly as before.
  if(groupOrder)rows=rows.slice().sort((a,b)=>groupOrder.indexOf(a.grp)-groupOrder.indexOf(b.grp));
  return '<div class="pool"><span>Points</span><span class="pv '+(spent===pool?"ok":(spent>pool?"bad":""))+'">'+spent+' / '+pool+'</span>'
   +'<div class="pbar"><i style="width:'+Math.min(100,spent/pool*100)+'%"></i></div><span class="note">'+rem+' left'+(min?' &middot; '+min+'&ndash;'+max+' each':' &middot; max '+max+' each')+'</span></div>'
   +(quote?'<div class="rulequote">'+quote+'</div>':"")
   +'<table class="alloc"><tr><th>Skill</th><th class="num">Base</th><th>'+phase+' pts</th><th class="num">Total %</th></tr>'
   +rows.map((r,i)=>{
     const v=aGet(phase,r.key);
     const bad=(v>max)||(min?(v>0&&v<min):(v<0));
     const groupHead=(groupOrder&&(i===0||rows[i-1].grp!==r.grp))
       ?'<tr class="allocgrp"><td colspan="4">'+esc(r.grp||"")+'</td></tr>':"";
     return groupHead+'<tr class="'+(bad?"bad ":"")+(r.required?"req":"")+'"><td>'+esc(r.label)+'</td><td class="num">'+r.base+(r.plus40?" +40":"")+'</td>'
      +'<td><span class="stp"><button aria-label="decrease points" onclick="APP.aAdj(\''+phase+'\',\''+jsq(r.key)+'\',-1)">&minus;</button>'
      +'<input type="number" value="'+v+'" min="0" max="'+max+'" onchange="APP.aSet(\''+phase+'\',\''+jsq(r.key)+'\',this.value)">'
      +'<button aria-label="increase points" onclick="APP.aAdj(\''+phase+'\',\''+jsq(r.key)+'\',1)">+</button>'
      +'<button class="chip actionchip" onclick="APP.aSet(\''+phase+'\',\''+jsq(r.key)+'\','+(min||0)+')">min</button>'
      +'<button class="chip actionchip" onclick="APP.aSet(\''+phase+'\',\''+jsq(r.key)+'\','+max+')">max</button>'
      +'</span></td>'
      +'<td class="num">'+finalPct(r.key)+'%</td></tr>';}).join("")
   +'</table>';
}
function rowFor(key,required){const em=entryMap();const e=em[key];if(!e)return null;
  return {key,label:e.label,base:e.base,required:!!required,plus40:(key==="std:Customs"||key==="std:Native Tongue")};}

/* ---- step: culture ---- */
function stepCulture(){
  let h=head("Culture","Your cultural background: +40% to Customs and Native Tongue, three Professional Skills, an optional Combat Style, and 100 points across all of them.");
  h+='<div class="pickgrid">'+Object.keys(CULTURES).map(n=>'<button class="pick '+(S.culture===n?"on":"")+'" onclick="APP.pickCulture(\''+n+'\')"><span class="pn">'+n+'</span><div class="pd">'+CULTURES[n].blurb+'</div></button>').join("")+'</div>';
  if(!S.culture)return h;
  const c=CULTURES[S.culture];
  h+='<div class="card"><h3>Standard skills</h3><p class="note">'+c.std.join(", ")+(c.choice?"; <i>"+esc(c.choice.text)+"</i>":"")+'</p>';
  if(c.choice){h+='<div class="choicechips">'+c.choice.from.map(sk=>'<button class="chip '+(S.cultChoice.includes(sk)?"on":"")+'" onclick="APP.cultChoice(\''+sk+'\')">'+sk+'</button>').join("")+'</div>';}
  h+='<p class="note">Customs and Native Tongue gain <b>+40%</b> each, irrespective of the culture chosen (applied automatically).</p></div>';
  h+='<div class="card"><h3>Three professional skills</h3>'+profPickers("cult",c.prof,3)+'</div>';
  h+='<div class="card"><h3>Combat style <span class="note">(optional &mdash; &ldquo;If desired, select a single Combat Style&rdquo;)</span></h3>'
   +'<p><label><input type="checkbox" '+(S.cultStyleOn?"checked":"")+' onchange="APP.cultStyle(this.checked)"> Take a cultural combat style</label></p>'
   +(S.cultStyleOn?fld("Style name (weapons &amp; traits per your GM)",'<input type="text" value="'+esc(S.cultStyleName)+'" placeholder="e.g. '+esc(c.styles.split(",")[0].trim())+'" onchange="APP.set2(\'cultStyleName\',this.value)">'):"")
   +'<p class="note">Examples for '+S.culture+': '+esc(c.styles)+'</p></div>';
  const rows=cultureReqKeys().map(k=>rowFor(k,true)).filter(Boolean);
  h+='<div class="card"><h3>Allocate 100 cultural points</h3>'
   +allocTable("culture",rows,100,5,15,"&ldquo;Distribute 100 points amongst the listed Standard Skills, the chosen Professional Skills, and the Combat Style (if selected)&hellip; each skill must receive a minimum of 5% and cannot receive more than 15%.&rdquo;")+'</div>';
  h+='<div class="card"><h3>Cultural passions</h3><p class="note">Suggested for '+S.culture+': '+c.passions.map(esc).join(" &middot; ")+' &mdash; set values at the Passions step.</p></div>';
  return h;
}
function profPickers(which,offers,slots){
  const picks=which==="cult"?S.cultProf:(which==="car"?S.carProf:S.qProf),
    specs=which==="cult"?S.cultProfSpec:(which==="car"?S.carProfSpec:S.qProfSpec);
  const parsed=offers.map(parseOffer);
  // Fallback to the generic speciality hints (used elsewhere for Quick
  // Character / custom careers) when an offer string has no "(hint)" of its
  // own — e.g. a custom career's flat, unparenthesised skill list — so a
  // speciality box still appears for skills that always need one (Craft,
  // Lore, Language, etc.) instead of silently skipping it.
  const hintFor=name=>{const o=parsed.find(x=>x.name===name);return (o&&o.hint)?o.hint:(QUICK_SPEC_HINTS[name]||null);};
  let h="";
  for(let i=0;i<slots;i++){
    const cur=picks[i]||"";
    const hint=cur?hintFor(cur):null;
    h+='<div style="display:flex;gap:8px;align-items:center;margin:5px 0;flex-wrap:wrap">'
     +'<span class="note" style="width:18px">'+(i+1)+'.</span>'
     +'<select onchange="APP.pickProf(\''+which+'\','+i+',this.value)"><option value="">&mdash; choose &mdash;</option>'
     +parsed.filter(o=>o.name===cur||!picks.some((p,j)=>j!==i&&p===o.name)).map(o=>'<option value="'+esc(o.name)+'" '+(cur===o.name?"selected":"")+'>'+esc(o.name+(hintFor(o.name)?" ("+hintFor(o.name)+")":""))+'</option>').join("")+'</select>'
     +(hint?'<input type="text" value="'+esc(specs[i])+'" placeholder="speciality: '+esc(hint)+'" style="flex:1;min-width:160px" onchange="APP.profSpec(\''+which+'\','+i+',this.value)">':"")
     +'</div>';
  }
  return h;
}

/* ---- step: career ---- */

  h+='<div class="pickgrid">'+Object.keys(CAREERS).map(n=>'<button class="pick '+(S.career===n&&!S.customCareer.isCustom?"on":"")+'" onclick="APP.pickCareer(\''+n+'\')"><span class="pn">'+n+'</span></button>').join("");
  h+='<button class="pick '+(S.customCareer.isCustom?"on":"")+'" onclick="APP.pickCareer(\'__custom__\')"><span class="pn">Custom Career</span><div class="pd">Build your own using the core rules</div></button></div>';
  
  // If custom is being built and not yet named, show the builder

    h+='<div class="card"><h3>Build your custom career</h3>'
     +'<div class="field" style="margin-bottom:12px"><label>Career name</label><input type="text" value="'+esc(S.customCareer.name)+'" placeholder="e.g. Mercenary, Scholar, Scout" onchange="APP.customCareerName(this.value)" style="width:100%;"></div>'
     +'<div class="field" style="margin-bottom:12px"><label>Standard skills (pick any, no limits)</label><div class="choicechips">'
     +STD.map(([sk,_])=>'<button class="chip '+(S.customCareer.std.includes(sk)?"on":"")+'" onclick="APP.customCareerStd(\''+sk+'\')">'+sk+'</button>').join("")
     +'</div></div>'
     +'<div class="field" style="margin-bottom:12px"><label>Professional skills (pick up to 3)</label>'
     +profPickers("car",Object.keys(PROF).sort(),3)
     +'</div>'
     +'<div class="field"><label>Combat style slots (0–2)</label>'
     +'<select onchange="APP.customCareerStyles(+this.value)" style="width:100%;">'
     +'<option value="0" '+(S.customCareer.styleSlots===0?"selected":"")+'>None</option>'
     +'<option value="1" '+(S.customCareer.styleSlots===1?"selected":"")+'>One</option>'
     +'<option value="2" '+(S.customCareer.styleSlots===2?"selected":"")+'>Two</option>'
     +'</select></div>'
     +'<p class="note" style="margin-top:10px">Give it a name above to lock it in and continue &mdash; you can always come back and edit the standard skills or style slots later from the &ldquo;Edit custom career&rdquo; button.</p></div>';
    return h;
  }

  if(!S.career)return h;

  h+='<div class="card"><h3>Standard skills</h3><p class="note">'+k.std.join(", ")+(k.styleSlots.length?"; Combat Style: "+k.styleSlots.map((s,i)=>s||("Combat Style "+(i+1))).join("; Combat Style: "):"")+'</p>'
   +(S.customCareer.isCustom?'<p style="margin-top:8px"><button class="chip" onclick="APP.editCustomCareer()">Edit custom career (standard skills / style slots)</button></p>':"")+'</div>';
  if(k.styleSlots.length){
    h+='<div class="card"><h3>Career combat style'+(k.styleSlots.length>1?"s":"")+'</h3>';
    k.styleSlots.forEach((slot,i)=>{
      const cs=S.carStyles[i]||{mode:"new",name:""};
      h+='<div style="margin:6px 0"><span class="note">'+(S.customCareer.isCustom?"Combat Style "+(i+1):esc(slot))+':</span> '
       +'<select onchange="APP.carStyleMode('+i+',this.value)">'
       +'<option value="new" '+(cs.mode==="new"?"selected":"")+'>new style</option>'
       +(S.cultStyleOn?'<option value="link" '+(cs.mode==="link"?"selected":"")+'>same as cultural style</option>':"")
       +'</select> '
       +(cs.mode==="new"?'<input type="text" value="'+esc(cs.name)+'" placeholder="style name" onchange="APP.carStyleName('+i+',this.value)">':'<span class="note">'+esc(S.cultStyleName||"Cultural Combat Style")+'</span>')
       +'</div>';
    });
    h+='<p class="note">&ldquo;Choosing a Style or Professional Skill previously gained via cultural background simply allows the character to further apply some of their career skill points.&rdquo;</p></div>';
  }
  const carProfOffers=S.customCareer.isCustom?Object.keys(PROF).sort():k.prof;
  h+='<div class="card"><h3>Up to three professional skills</h3>'+profPickers("car",carProfOffers,3)+'</div>';
  const rows=careerKeys().map(key=>rowFor(key,false)).filter(Boolean);
  h+='<div class="card"><h3>Allocate 100 career points</h3>'
   +allocTable("career",rows,100,0,15,"&ldquo;Distribute 100 points amongst the career&rsquo;s listed Standard Skills and whatever Professional Skills were chosen&hellip; Not all of the available skills need to be improved, but no individual skill can receive more than 15%.&rdquo;")+'</div>';
  return h;
}

/* ---- step: bonus ---- */
function stepBonus(){
  const pool=bonusPool(),cap=bonusCap(),tierExtra=ARCHETYPES[S.archetype].bonusExtra||0;
  let h=head("Bonus Skill Points","Free development: "+pool+" points across anything the character knows, no more than "+cap+"% to any one skill &mdash; plus one extra Professional Skill as a hobby.");
  const hobOff=Object.keys(PROF).sort();
  h+='<div class="card"><h3>Hobby skill</h3>'
   +'<div class="rulequote">&ldquo;Default characters have 150 points with a limit of assigning no more than 15 points per skill. Choose one additional Professional skill as a hobby speciality.&rdquo;'
   +(tierExtra?' &mdash; '+ARCHETYPES[S.archetype].label+' adds +'+tierExtra+' points and raises the per-skill cap to '+cap+'% (Mythras Companion, pp.54&ndash;55).':"")+'</div>'
   +'<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">'
   +'<select onchange="APP.hobby(this.value)"><option value="">&mdash; choose a hobby skill &mdash;</option>'
   +hobOff.map(n=>'<option '+(S.hobby===n?"selected":"")+'>'+n+'</option>').join("")+'</select>'
   +(S.hobby?'<input type="text" value="'+esc(S.hobbySpec)+'" placeholder="speciality (if any)" onchange="APP.set2(\'hobbySpec\',this.value)">':"")
   +'</div></div>';
  const es=allEntries();
  h+='<div class="card"><h3>Allocate '+pool+' bonus points</h3>'

function passionVal(p){
  if(!charsReady())return "?";const c=S.chars;
  switch(p.type){
   case "romantic":return 30+(+p.subjPOW||0)+(+p.subjCHA||0);
   case "platonic":case "averse":return 30+c.POW+(+p.subjCHA||0);
   case "org":case "place":return 30+c.POW+c.INT;
   case "species":case "object":return 30+c.POW*2;
  }return 30;

/* ---- weapons & armour helpers ---- */
// No STR/DEX minimum mechanic exists for weapons in Mythras (an earlier
// pass fabricated one) — real weapon stats are Damage, Size, Reach, Combat
// Effects, ENC, the weapon's own AP/HP, Traits, Milieu and Cost, all now
// transcribed from the book (see the WEAPONS data-block comment above).
function weaponsEnc(){return S.gearWeapons.reduce((a,n)=>{const w=WEAPON_MAP[n];return a+(w?w.enc:0);},0);}
// Worn armour counts at half its packed ENC value while worn; carried
// (unworn) armour counts full ENC (core rulebook, Encumbrance section,
// confirmed against page image). "Each Arm"/"Each Leg" are single pickers
// covering two physical locations apiece, so they're weighted x2 here to
// match the book's 7-location totals (Head, Chest, Abdomen, R/L Arm, R/L Leg).
function armorEncAt(loc){const m=ARMOR_MAP[S.armor[loc]]||ARMOR_MAP.None;return m.encPerLoc*0.5;}
function armorLocWeight(loc){return (loc==="Each Arm"||loc==="Each Leg")?2:1;}
function armorEncTotal(){return ARMOR_LOCATIONS.reduce((a,l)=>a+armorEncAt(l)*armorLocWeight(l),0);}
function armorApAt(loc){const m=ARMOR_MAP[S.armor[loc]]||ARMOR_MAP.None;return m.ap;}
function gearEncTotal(){return S.inventory.reduce((a,it)=>a+(it.qty||0)*(it.enc||0),0)+weaponsEnc()+armorEncTotal();}
// Armour Penalty to Initiative (core rulebook, p.58, confirmed against page
// image): sum the FULL (unhalved) ENC of every worn armour location, divide
// by 5, round up, subtract from Initiative Bonus. Worked example in the book:
// a full Plated Mail suit (ENC 6/location x 7 locations = 42) => 42/5 = 8.4,
// rounded up to 9 => Initiative Penalty -9.
function armourPenaltyToInit(){
  const total=ARMOR_LOCATIONS.reduce((a,l)=>{const m=ARMOR_MAP[S.armor[l]]||ARMOR_MAP.None;return a+m.encPerLoc*armorLocWeight(l);},0);
  return total<=0?0:Math.ceil(total/5);
}
// Encumbrance (core rulebook, Encumbrance section, confirmed against page
// image): unencumbered up to STR x2. Over STR x2 ("Burdened"): skills using
// STR or DEX (including Combat Styles) are one Grade harder, Movement -2m,
// no sprinting, counts as Medium activity for Fatigue. Over STR x3
// ("Overloaded"): two Grades harder, Movement halved and walk-only, counts
// as Strenuous activity for Fatigue. STR x4 is a hard cap — cannot be
// carried at all, encumbered or not.
function encLimit(){return charsReady()?S.chars.STR*2:null;}
function encStatus(){
  if(!charsReady())return null;
  const total=gearEncTotal(),lim=S.chars.STR*2,over=S.chars.STR*3,cap=S.chars.STR*4;
  if(total<=lim)return {level:"ok",msg:"Within your unencumbered limit."};
  if(total<=over)return {level:"warn",msg:"Burdened &mdash; over STR&times;2 ("+lim+"): STR/DEX-based skills (including Combat Styles) are one Grade harder, Movement -2m, no sprinting."};
  if(total<=cap)return {level:"bad",msg:"Overloaded &mdash; over STR&times;3 ("+over+"): STR/DEX-based skills are two Grades harder, Movement halved, walk-only."};
  return {level:"bad",msg:"Over the STR&times;4 hard cap ("+cap+") &mdash; this much cannot physically be carried, per the book."};
}

// One key/value row for the dense sheet's small boxes (Player & Character,
// Background, Equipment, Money, etc). Value is expected pre-escaped/safe
// where it comes from esc() already; plain numbers pass through fine.
function mkv(k,v){return '<div class="mkv"><span>'+k+'</span><b>'+v+'</b></div>';}
// Small inline body-outline diagram for the Hit Locations box — seven dots
// (Head/Chest/Abdomen/R+L Arm/R+L Leg) each showing that location's current
// AP, echoing the dot-diagram most printed Mythras/BRP-family sheets use
// next to the Hit Location table.
function bodyDiagramSvg(){
  const pts=[["Head",30,9],["Chest",30,27],["Abdomen",30,43],
    ["Right Arm",13,29],["Left Arm",47,29],["Right Leg",22,70],["Left Leg",38,70]];
  return '<svg viewBox="0 0 60 90" class="mbodysvg" aria-hidden="true">'

     return '<circle cx="'+x+'" cy="'+y+'" r="7.5"><title>'+esc(lbl)+' — AP '+ap+'</title></circle>'
      +'<text x="'+x+'" y="'+(y+2.6)+'" text-anchor="middle">'+ap+'</text>';}).join("")
   +'</svg>';

/* ================= PLAY MODE ================= */
// Session tracking for a finished character: current HP per hit location,
// current Luck/Magic Points, and an Action-Points-used-this-round counter.
// All derived maxes reuse the exact same functions the sheet already uses
// (hpLocsFinal/luckFinal/c.POW) so Play Mode can never drift from the
// character-gen numbers — only S.play holds anything new.
const PLAY_HP_LOCS=["Head","Chest","Abdomen","Right Arm","Left Arm","Right Leg","Left Leg"];
// The core Hit Locations table (pp.9-10) gives one shared max-HP value for
// "Each Arm" and "Each Leg" — both arms have the same max, both legs have
// the same max. But current HP lost to a hit is per-side (a wound to the
// right arm shouldn't drain the left arm's HP too), so Play Mode tracks 7
// separate boxes while still deriving each one's max off the existing
// shared "Each Arm"/"Each Leg" sheet numbers below.
const PLAY_LIMB_BASE={"Right Arm":"Each Arm","Left Arm":"Each Arm","Right Leg":"Each Leg","Left Leg":"Each Leg"};
// charVitals(state): pure function computing every Play Mode / Party Board
// number off an arbitrary character state object (defaults to the global S
// being edited). This exists so the live Party Board can read another
// character's saved `state` blob (fetched straight from Supabase, never
// loaded into S) using the exact same math Play Mode uses on its own
// character — the two can never drift apart on wound-tier thresholds,
// HP totals, or resource maxes, because they're the same code path.
function charVitals(state){
  state=state||S;
  const c=state.chars;
  const locs=PLAY_HP_LOCS.map(loc=>{
    const key=PLAY_LIMB_BASE[loc]||loc;
    const row=hpLocsFinal(c.CON,c.SIZ).find(x=>x[0]===key);
    const max=row?row[1]:0;
    let v=state.play.hp[loc];
    if(v==null){
      // One-time migration path: earlier saves tracked "Each Arm"/"Each Leg"
      // as a single shared current-HP pool. If this specific side hasn't
      // taken damage yet under the new 7-box keys, inherit that old shared
      // value instead of silently snapping the limb back to full HP.
      const legacyKey=PLAY_LIMB_BASE[loc];
      if(legacyKey&&state.play.hp[legacyKey]!=null)v=state.play.hp[legacyKey];
    }
    const cur=v==null?max:Math.min(v,max);
    // Wound tiers per the core rulebook's "Damage and Wound Levels" (Combat
    // chapter): based on the location's own current remaining Hit Points
    // compared to zero and to the negative of its starting (max) Hit
    // Points — NOT single-hit damage magnitude, NOT a fabricated half-max
    // threshold. Minor Wound (shown "OK"): positive HP. Serious Wound: at
    // 0 or below but not yet at -max. Major Wound: at -max or lower.
    let cls,tag;
    if(cur>0){cls="ok";tag="OK";}
    else if(cur>-max){cls="serious";tag="Serious Wound";}
    else{cls="major";tag="Major Wound";}
    return {loc,cur,max,cls,tag};
  });
  const rank={ok:0,serious:1,major:2};
  const worst=locs.reduce((w,l)=>rank[l.cls]>rank[w]?l.cls:w,"ok");
  const worstLoc=locs.find(l=>l.cls===worst)||null;
  const hpCur=locs.reduce((a,l)=>a+Math.max(0,l.cur),0);
  const hpMax=locs.reduce((a,l)=>a+l.max,0);
  const maxLuck=luckFinal(c.POW), curLuck=state.play.luck==null?maxLuck:Math.min(state.play.luck,maxLuck);
  const maxMagic=c.POW, curMagic=state.play.magic==null?maxMagic:Math.min(state.play.magic,maxMagic);
  const maxAP=apFinal(c.INT,c.DEX,state.fixedAP);
  const apUsed=Math.min(state.play.apUsed||0,maxAP);
  const fatigue=state.play.fatigue||"Fresh";
  return {locs,worst,worstLoc,hpCur,hpMax,maxLuck,curLuck,maxMagic,curMagic,maxAP,apUsed,fatigue};
}
function playMaxHP(loc,state){const l=charVitals(state).locs.find(x=>x.loc===loc);return l?l.max:0;}
function playCurHP(loc,state){const l=charVitals(state).locs.find(x=>x.loc===loc);return l?l.cur:0;}
function playHPState(loc,state){const l=charVitals(state).locs.find(x=>x.loc===loc);return l?{tag:l.tag,cls:l.cls}:{tag:"OK",cls:"ok"};}
const PLAY_LIMB_LOCS=["Right Arm","Left Arm","Right Leg","Left Leg"];
// Short, book-accurate effect summaries surfaced as tooltips so a new player
// never has to go dig through the rulebook mid-fight to know what a wound
// tag actually does to them.
function playWoundEffectText(loc,cls){
  const isLimb=PLAY_LIMB_LOCS.includes(loc);
  if(cls==="ok")return "Minor Wound or better — no mechanical penalty.";
  if(cls==="serious"){
    return "Serious Wound: permanently scarred; can't attack or start casting for 1d3 rounds (can still parry/evade). "
      +(isLimb
        ? "Endurance test vs the attacker's roll or the limb goes useless until healed above 0 (leg: drop prone; arm: drop whatever it's holding)."
        : "Endurance test vs the attacker's roll or you're knocked out for minutes equal to the damage just taken.")
      +" Until healed back to Minor, all tasks using this location suffer a one-grade penalty at the GM's discretion.";
  }
  return "Major Wound: immediately incapacitated, can't keep fighting. "
    +(isLimb
      ? "Limb is severed/shattered/ripped off — you drop prone; Endurance test vs the attack roll or you black out from the agony; untreated within 5× Healing Rate minutes, you die of blood loss."
      : "Endurance test vs the attack roll or it's instant, gruesome death; even if you pass, untreated within 2× Healing Rate rounds you still die of blood loss.")
    +" Needs surgery or major magic to ever heal properly.";
}
function playMaxLuck(state){return charVitals(state).maxLuck;}
function playCurLuck(state){return charVitals(state).curLuck;}
function playMaxMagic(state){return charVitals(state).maxMagic;}

// Fatigue track (Combat chapter) — a real Mythras mechanic that was tracked
// nowhere in Play Mode before; each step applies escalating penalties the GM
// adjudicates, so this is deliberately just a label picker, not a formula.
const FATIGUE_LEVELS=["Fresh","Winded","Tired","Wearied","Exhausted","Debilitated","Incapacitated","Semi-Conscious","Comatose"];
function gradedPassivePct(key){const g=gradedPct(key,finalPct(key));return g.pct===null?GRADE_LABEL[g.grade]:g.pct+"%";}
function hitD20For(loc){const e=HIT_D20.find(x=>x[1]===loc);return e?e[0].replace("-","–"):"—";}
// ---- Vitals & Armour body diagram: colour ramp for the 7-zone figure and
// per-location dot. Uses the SAME wound-tier boundaries as playHPState()
// (>0 ok, <=0 & >-max serious, <=-max major) for the two "hurt" states that
// actually carry mechanical weight; healthy-vs-damaged-but-positive is a
// pure cosmetic gradient layered on top, matching the approved mockup —
// never surfaced as its own wound-tier *label* anywhere (the label always
// stays "OK", consistent with playHPState()/playWoundEffectText() already
// treating any positive HP as one undifferentiated tier).
const PM_C_HEALTHY=[65,75,87],PM_C_AMBER=[207,138,46],PM_C_RED=[214,65,54],
      PM_C_SERIOUS=[176,48,38],PM_C_MAJOR=[95,15,10];
function pmMix(a,b,t){return "rgb("+a.map((v,i)=>Math.round(v+(b[i]-v)*t)).join(",")+")";}
// Pure color math factored out of pmZoneFill/pmZoneStroke so the Party
// Board's read-only per-teammate hit-location strip can use the exact same
// gradient as Play Mode's live body diagram without touching global S —
// it's handed cur/max/cls straight from charVitals(otherCharsState).
function pmHpColor(cur,max,cls){
  if(cls==="serious")return "rgb("+PM_C_SERIOUS.join(",")+")";
  if(cls==="major")return "rgb("+PM_C_MAJOR.join(",")+")";
  if(max<=0)return "rgb("+PM_C_HEALTHY.join(",")+")";
  if(cur>=max)return "rgb("+PM_C_HEALTHY.join(",")+")";
  const f=.2+.8*(1-cur/max);
  return f<=.5?pmMix(PM_C_HEALTHY,PM_C_AMBER,f*2):pmMix(PM_C_AMBER,PM_C_RED,(f-.5)*2);
}
function pmHpStroke(cur,max,cls){
  if(cls!=="ok")return "#e0483c";
  return (max>0&&cur<max)?"#e0a53a":"#59636f";
}
function pmZoneFill(loc,state){const l=charVitals(state).locs.find(x=>x.loc===loc);return pmHpColor(l.cur,l.max,l.cls);}
function pmZoneStroke(loc,state){const l=charVitals(state).locs.find(x=>x.loc===loc);return pmHpStroke(l.cur,l.max,l.cls);}
function pmShortName(l){return l.replace("Right ","R. ").replace("Left ","L. ");}

function pmBodySvg(){
  const zonesHtml=PLAY_HP_LOCS.map(loc=>{
    const [tag,attrs]=PM_ZONE_SHAPES[loc];
    const fill=pmZoneFill(loc),stroke=pmZoneStroke(loc);
    const major=playHPState(loc).cls==="major";
    const sel=S.play.selectedLoc===loc;
    const armLoc=PLAY_LIMB_BASE[loc]||loc;
    return '<g class="bz'+(major?" major":"")+(sel?" sel":"")+'" onclick="APP.playSelectLoc(\''+loc+'\')" role="button" tabindex="0" aria-label="'+loc+'">'
     +'<'+tag+' class="shape" '+attrs+' style="fill:'+fill+';stroke:'+stroke+'"/>'
     +'<'+tag+' class="hatch" '+attrs+' fill="url(#pmhatch)" stroke="none"/>'
     +'<title>'+loc+' — '+playCurHP(loc)+'/'+playMaxHP(loc)+' HP · AP '+armorApAt(armLoc)+'</title></g>';
  }).join("");

   +'<defs><pattern id="pmhatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="7" height="7" fill="transparent"/><line x1="0" y1="0" x2="0" y2="7" stroke="rgba(0,0,0,.45)" stroke-width="3"/></pattern></defs>'
   +zonesHtml+'</svg><div class="pm-figcap">facing you &mdash; their right is your left</div></div>';
}
function pmLocRow(loc){

function pmVitalsCard(){
  const totCur=PLAY_HP_LOCS.reduce((a,l)=>a+Math.max(0,playCurHP(l)),0);
  const totMax=PLAY_HP_LOCS.reduce((a,l)=>a+playMaxHP(l),0);
  const worstRank={ok:0,serious:1,major:2};
  const worst=PLAY_HP_LOCS.reduce((w,l)=>{const st=playHPState(l).cls;return worstRank[st]>worstRank[w]?st:w;},"ok");
  const worstLoc=PLAY_HP_LOCS.find(l=>playHPState(l).cls===worst);
  const worstTag={ok:"OK",serious:"Serious Wound",major:"Major Wound"}[worst];
  const barColor=worst==="major"?"var(--pm-bad)":worst==="serious"?"var(--pm-warn)":"var(--pm-good)";
  let h='<div class="pm-box" id="pm-vitals"><div class="pm-vit-head"><h3>Vitals &amp; Armour</h3>'
   +'<span class="pm-condchip '+worst+'" title="'+esc(playWoundEffectText(worstLoc,worst))+'">'+worstTag+'</span></div>';
  h+='<div class="pm-vit-total"><span class="lbl">Total HP</span><div class="pm-totbar"><i style="width:'+(totMax>0?Math.max(0,Math.min(100,totCur/totMax*100)):0)+'%;background:'+barColor+'"></i></div>'
   +'<span class="num">'+totCur+' <span>/ '+totMax+'</span></span></div>';
  h+='<div class="pm-vit-body">'+pmBodySvg()+'<div class="pm-loclist">'+PLAY_HP_LOCS.map(pmLocRow).join("")+'</div></div>';
  h+='<div class="pm-legend"><span>Healthy</span><div class="pm-legendgrad"></div><span>Major Wound</span></div>';
  h+=pmLocDetail();
  h+='</div>';
  return h;
}

function pmCombatBox(){
  const c=S.chars,initPenalty=armourPenaltyToInit();
  const maxAP=playMaxAP(),usedAP=Math.min(S.play.apUsed,maxAP),remainAP=maxAP-usedAP;
  const maxLuck=playMaxLuck(),curLuck=playCurLuck();
  const maxMagic=playMaxMagic(),curMagic=playCurMagic();
  const tiles=[["Initiative",initBonus(c.INT,c.DEX)-initPenalty],["Damage Mod",dmCalc(c.STR,c.SIZ)],["Movement","6m"],["Heal Rate",healRate(c.CON)]];
  let h='<div class="pm-box"><h3>Combat</h3><div class="pm-combatgrid">'
   +tiles.map(([l,v])=>'<div class="pm-cstat"><div class="l">'+l+'</div><div class="v">'+v+'</div></div>').join("")+'</div>';
  h+='<div class="pm-trackrow"><span class="lbl">Action Points</span><span class="pm-pips" title="Click a pip to spend / restore">'
   +Array.from({length:maxAP},(_,i)=>'<button class="pm-pip'+(i<remainAP?"":" off")+'" aria-label="action point" onclick="APP.playApSetPip('+i+')"></button>').join("")+'</span></div>';
  h+='<div class="pm-trackrow"><span class="lbl">Luck Points</span><span class="pm-pips" title="Click a pip to spend / restore">'
   +Array.from({length:maxLuck},(_,i)=>'<button class="pm-pip'+(i<curLuck?"":" off")+'" aria-label="luck point" onclick="APP.playLuckSetPip('+i+')"></button>').join("")+'</span></div>';
  h+='<div class="pm-trackrow"><span class="lbl">Magic Points</span><span style="display:flex;gap:6px;align-items:center">'
   +'<button class="pm-sbtn" onclick="APP.playMagicAdj(-1)">&minus;</button><span class="mp">'+curMagic+' <span>/ '+maxMagic+'</span></span>'
   +'<button class="pm-sbtn" onclick="APP.playMagicAdj(1)">+</button></span></div>';
  h+='<div class="pm-trackrow"><span class="lbl" title="Fatigue levels apply escalating penalties (Combat chapter) — GM-adjudicated, not auto-calculated here.">Fatigue</span>'

  h+='</div>';
  return h;
}

   margin of success — read straight off the Differential Roll Results
   table below — is how many Special Effects they get to pick, mixing and

  Fumble:{Critical:-3,Success:-2,Failure:0,Fumble:0}
};
function playEffectsWon(mine,theirs){return DIFF_TABLE[mine]?.[theirs] ?? 0;}

// Reach categories (core p.106), shortest to longest. Every melee/shield
// entry in WEAPONS already carries one of these in its "reach" field — this
// just gives that existing data an order so Play Mode can explain, in plain
// language, which of a character's actual weapons out-reaches which.
const REACH_ORDER=["T","S","M","L","VL"];
const REACH_NAME={T:"Touch",S:"Short",M:"Medium",L:"Long",VL:"Very Long"};
// Groups the 43 Special Effects by what the winner is actually trying to
// accomplish (per notesfrompavis.blog's "Tactics of Selecting Special
// Effects" posts) instead of alphabetically — lets a player who knows
// "I want to disarm them" jump straight to the relevant handful instead of
// scanning the full list. Effects not mentioned by name fall into a final
// "Other" bucket automatically, so this can never silently drop one.
const FX_GROUPS=[
  ["Hurt or finish them off",["Bleed","Impale","Maximise Damage","Bypass Armour","Circumvent Cover","Overpenetration","Drop Foe","Kill Silently"]],
  ["Disarm, break, or steal their edge",["Disarm Opponent","Take Weapon","Damage Weapon","Sunder"]],
  ["Stop them acting / force a bad turn",["Press Advantage","Pin Down","Force Failure","Overextend Opponent","Compel Surrender","Remise"]],
  ["Immobilise, trap, or knock down",["Bash","Entangle","Grip","Pin Weapon","Stun Location","Trip Opponent"]],
  ["Control range and positioning",["Close Range","Open Range","Circumvent Parry","Choose Location","Marksman","Withdraw"]],
  ["Protect yourself / recover",["Enhance Parry","Stand Fast","Arise","Slip Free","Select Target","Blind Opponent","Accidental Injury","Prepare Counter","Weapon Malfunction (Firearms)"]],
  ["Follow-up attacks & tempo",["Flurry","Rapid Reload","Duck Back"]],
  ["Battlefield theatre",["Scar Foe"]]
];
// Renders the "Special Effects" tab: the Differential Roll cheat-table
// (how many effects a given margin of success wins), an optional-rule note
// on Weapon Reach, and the full, book-accurate list of effects grouped by
// tactical intent (see FX_GROUPS above) rather than alphabetically — a new
// player thinking "I want to disarm them" can jump straight to the right
// handful. Each effect is collapsed behind a <details> so the tab isn't an
// intimidating wall of text; only the summary badges (Offensive/Defensive,
// weapon restriction, roll requirement, stackable) show until expanded.
function specialEffectsPanel(){
  let h='<p class="pm-notes" style="margin-bottom:10px">Whenever you and an opponent both roll an opposed Combat Style (or Combat Style vs Evade), the <b>margin</b> between your results — read off the table below — is how many Special Effects you win. Pick freely from anything you qualify for; some can be taken more than once (marked <b>stacks</b>). Losing the roll can hand your opponent effects the same way.</p>';
  h+='<table class="pm-atktable" style="margin-bottom:14px"><tr><th>You rolled</th><th>Opponent Critical</th><th>Opponent Success</th><th>Opponent Failure</th><th>Opponent Fumble</th></tr>'
   +["Critical","Success","Failure","Fumble"].map(mine=>'<tr><td><b>'+mine+'</b></td>'
     +["Critical","Success","Failure","Fumble"].map(theirs=>{const n=playEffectsWon(mine,theirs);
       return '<td>'+(n>0?'You win '+n:(n<0?'Opponent wins '+(-n):'No benefit'))+'</td>';}).join("")+'</tr>').join("")
   +'</table>';
  // Optional Reach rule callout, made concrete using this character's own
  // equipped melee/shield weapons where possible instead of just abstract
  // categories.
  const myReach=(S.gearWeapons||[]).map(nm=>WEAPON_MAP[nm]).filter(w=>w&&REACH_ORDER.includes(w.reach))
    .map(w=>w.name+" ("+REACH_NAME[w.reach]+")");
  h+='<details class="pm-fx-item" style="margin-bottom:14px"><summary>Optional Rule: Closing &amp; Opening Range <span class="pm-fx-badge">p.106</span></summary>'
   +'<p>Weapons have a Reach — Touch, Short, Medium, Long, or Very Long, shortest to longest ('+REACH_ORDER.map(r=>REACH_NAME[r]).join(" &lt; ")+') — shown on every melee weapon and shield on your character sheet. Before anyone swings, combatants can jockey for range:</p>'
   +'<p><b>Closing in</b> (the <i>Close Range</i> Special Effect, or simple GM-adjudicated positioning): moving inside a longer weapon’s Reach means that weapon can no longer parry, and its effective blocking Size drops by <b>two categories</b> for as long as the fight stays that close — a spear or halberd becomes clumsy up close against a dagger or shortsword.</p>'
   +'<p><b>Holding them off</b> (the <i>Open Range</i> Special Effect): keeping the fight at your weapon’s longer Reach means the shorter weapon can only attack <i>your weapon itself</i> — trying to knock it aside, sunder it, grab it — not you, until they manage to close the distance.</p>'
   +(myReach.length?'<p class="pm-notes">Your weapons, shortest to longest reach: '+myReach.sort((a,b)=>REACH_ORDER.indexOf(WEAPON_MAP[a.split(" (")[0]]?.reach)-REACH_ORDER.indexOf(WEAPON_MAP[b.split(" (")[0]]?.reach)).join(", ")+'.</p>':'')
   +'</details>';
  h+='<div class="pm-fx-list">'+FX_GROUPS.map(([groupName,names])=>{
    const items=names.map(n=>SPECIAL_EFFECTS.find(e=>e[0]===n)).filter(Boolean);
    return '<div class="pm-fx-group"><h4 class="pm-fx-grouphead">'+esc(groupName)+'</h4>'
     +items.map(([name,off,def,weapon,roll,stack,text])=>{
       const badges=[off?'<span class="pm-fx-badge off">Offensive</span>':"",def?'<span class="pm-fx-badge def">Defensive</span>':"",
         weapon?'<span class="pm-fx-badge">'+esc(weapon)+'</span>':"",roll?'<span class="pm-fx-badge roll">'+esc(roll)+'</span>':"",
         stack?'<span class="pm-fx-badge stack">Stacks</span>':""].join("");
       return '<details class="pm-fx-item"><summary>'+esc(name)+' '+badges+'</summary><p>'+esc(text)+'</p></details>';
     }).join("")+'</div>';
  }).join("")
   +(()=>{ // safety net: any effect not placed in a group above still shows up, so re-grouping can never silently hide one
     const grouped=new Set(FX_GROUPS.flatMap(([,names])=>names));
     const leftover=SPECIAL_EFFECTS.filter(e=>!grouped.has(e[0]));
     if(!leftover.length)return "";
     return '<div class="pm-fx-group"><h4 class="pm-fx-grouphead">Other</h4>'+leftover.map(([name,off,def,weapon,roll,stack,text])=>{
       const badges=[off?'<span class="pm-fx-badge off">Offensive</span>':"",def?'<span class="pm-fx-badge def">Defensive</span>':"",
         weapon?'<span class="pm-fx-badge">'+esc(weapon)+'</span>':"",roll?'<span class="pm-fx-badge roll">'+esc(roll)+'</span>':"",
         stack?'<span class="pm-fx-badge stack">Stacks</span>':""].join("");
       return '<details class="pm-fx-item"><summary>'+esc(name)+' '+badges+'</summary><p>'+esc(text)+'</p></details>';
     }).join("")+'</div>';
   })()
   +'</div>';
  return h;
}
// A roll-log row. Combat Style rolls that beat a Success (i.e. Critical or
// Success) get an inline "opponent rolled..." picker so a first-timer can
// immediately see how many Special Effects that roll actually won, instead
// of having to separately look up the Differential Roll table themselves.
function playRollLogRow(r,i){
  let row='<div class="'+(i===0?"fresh":"")+'">d100 = <b>'+(r.roll===100?"00":r.roll)+'</b> vs '+esc(r.label)+' '+r.pct+'% &rarr; <b>'+r.tier+'</b>';
  // Shown for every combat roll, not just Criticals/Successes — a Failure
  // or Fumble can still hand the *opponent* Special Effects off the same
  // Differential Roll table, so a new player needs to see that too, not
  // just when they themselves won.
  if(r.combat){
    if(!r.oppTier){
      row+='<div class="pm-fx-resolve">Opponent rolled: '+["Critical","Success","Failure","Fumble"].map(t=>
        '<button class="pm-btn sm" onclick="APP.playSetOpponentTier('+i+',\''+t+'\')">'+t+'</button>').join("")+'</div>';
    }else{
      const n=playEffectsWon(r.tier,r.oppTier);
      row+='<div class="pm-fx-resolve">'+(n>0?'vs opponent '+r.oppTier+' &rarr; <b>you win '+n+' Special Effect'+(n>1?"s":"")+'</b> — pick from the Special Effects tab.'
        :n<0?'vs opponent '+r.oppTier+' &rarr; <b>opponent wins '+(-n)+' Special Effect'+(-n>1?"s":"")+'</b> against you.'
        :'vs opponent '+r.oppTier+' &rarr; no Special Effects either way.')+'</div>';
    }
  }
  return row+'</div>';
}
function renderPlayView(){
  document.body.classList.remove("menu-mode");
  document.body.classList.add("play-mode");

  document.title=(S.concept.name?S.concept.name+" — ":"")+"Play Mode";
  if(!charsReady()){
    $("#main").innerHTML='<div class="pm-wrap"><p><button class="pm-btn" onclick="APP.backFromPlay()">&#8592; Edit Character</button></p>'
     +'<p class="pm-empty" style="margin-top:14px">Finish Characteristics first &mdash; Play Mode needs those numbers to work from.</p></div>';
    return;
  }
  const c=S.chars;
  const name=S.concept.name||"Unnamed Character";
  const careerName=S.customCareer.isCustom?S.customCareer.name:S.career;
  const initPenalty=armourPenaltyToInit();
  const tab=S.play.tab||"actions";
  const initials=(name.match(/\b[A-Za-z]/g)||["?"]).slice(0,2).join("").toUpperCase();

  let h='<div class="pm-wrap">';

  // ---- top bar: back + portrait/name (left) + characteristic bubble row (fills the rest) ----
  const backLabel=(VIEW_ONLY||PLAY_RETURN_VIEW==="board")?"&#8592; Back to Party Board":"&#8592; Edit Character";
  h+='<div class="pm-topbar"><button class="pm-btn" onclick="APP.backFromPlay()">'+backLabel+'</button>'
   +(VIEW_ONLY?"":'<button class="pm-btn" onclick="APP.toSheet(\'play\')" title="View / print the full character sheet">Print Sheet</button>')
   +'<div class="pm-idblock"><div class="pm-portrait">'+esc(initials)+'</div><div>'
   +'<div class="pm-title">'+esc(name)+'</div>'
   +'<div class="pm-sub">'+esc([S.culture,careerName,S.archetype!=="ordinary"?ARCHETYPES[S.archetype].label:null].filter(Boolean).join(" · ")||"Play Mode")+'</div></div></div>';
  if(VIEW_ONLY){
    h+='<div class="pm-viewonly-banner">Viewing '+esc(VIEW_ONLY_OWNER_NAME||"a teammate")+'&rsquo;s character &mdash; read-only'
     +(VIEW_ONLY_IS_DM?', except Inventory (as DM you can edit loot/gear here).':'. Only they can change it.')+'</div>';
  }

  const abilities=[
    ["STR",c.STR,"Enc Limit",encLimit()],
    ["CON",c.CON,"Heal Rate",healRate(c.CON)],
    ["SIZ",c.SIZ,"Dmg Mod",dmCalc(c.STR,c.SIZ)],
    ["DEX",c.DEX,"Initiative",initBonus(c.INT,c.DEX)-initPenalty],
    ["INT",c.INT,"Action Pts",apFinal(c.INT,c.DEX,S.fixedAP)],
    ["POW",c.POW,"Luck Pts",luckFinal(c.POW)],
    ["CHA",c.CHA,"Exp Mod",(xpMod(c.CHA)>=0?"+":"")+xpMod(c.CHA)]
  ];
  h+='<div class="pm-abilities">'+abilities.map(([nm,v,lk,lv])=>
    '<div class="pm-ability"><div class="pm-a-name">'+nm+'</div><div class="pm-a-score">'+v+'</div><div class="pm-a-derived">'+lk+' '+lv+'</div></div>'
  ).join("")+'</div>'
   +(VIEW_ONLY?"":'<button class="pm-btn" onclick="APP.openXP()" title="Experience Rolls — improve skills between sessions">Improve Skills'
     +(S.xp.pool?' <span class="pm-xpbadge">'+S.xp.pool+'</span>':'')+'</button>')
   +'</div>';

  // ---- three-column dashboard body: left = attributes + vitals/armour body
  // diagram, center = skills, right = combat readout + tabs + roll log.
  // (Redesign per approved mockup: playmode-redesign-mockup.html — the old
  // full-width HP strip and the left column's separate Resources/Passive
  // Stats/Combat Styles/Armour Worn boxes are superseded by the new Vitals
  // & Armour card, the Attributes pill grid, and the Combat box's pips —
  // Combat Styles and Armour are still fully visible via the Actions and
  // Inventory tabs respectively, nothing lost, just not duplicated.)
  h+='<div class="pm-columns">';

  h+='<div class="pm-col pm-col-left">';
  h+=pmAttributesGrid();
  h+=pmVitalsCard();
  h+='</div>';

  const styles=stylesList().map(s=>{const base=finalPct(s.key);const g=gradedPct(s.key,base);return {name:s.name,pct:g.pct===null?GRADE_LABEL[g.grade]:g.pct+"%"};});

  // -- center column: one continuous scrollable skills list --
  const es=allEntries();
  const grp=g=>es.filter(e=>e.grp===g).sort((a,b)=>a.label.localeCompare(b.label));
  const skrow=e=>{
    const base=finalPct(e.key);const g=gradedPct(e.key,base);
    const pctTxt=g.pct===null?GRADE_LABEL[g.grade]:g.pct+"%";
    return '<div class="pm-skillrow"><span class="dot" style="background:'+(e.trained?"var(--pm-good)":"#4a515b")+'"></span>'
     +'<span class="nm">'+esc(e.label)+'</span><span class="pctval" onclick="APP.toggleGradePop(\''+jsq(e.key)+'\',\''+jsq(e.label)+'\',event)" title="Click for Difficulty Grades">'+pctTxt+'</span>'
     +'<button class="pm-btn roll" onclick="APP.roll(\''+jsq(e.key)+'\')">roll</button></div>';
  };
  h+='<div class="pm-col pm-col-center"><div class="pm-box pm-skillsbox"><h3 title="Difficulty Grade multiplies every skill % before you roll — the GM calls a harder or easier Grade for the situation, not a fixed penalty per attempt. Very Easy x2 · Easy x1.5 · Standard x1 · Hard x2/3 · Formidable x1/2 · Herculean x1/10 · Automatic/Hopeless skip the roll entirely.">Skills'+(ACTIVE_GRADE!=="standard"?' <span class="pm-gradenote">('+GRADE_LABEL[ACTIVE_GRADE]+')</span>':"")+'</h3>';
  h+='<div class="pm-skillgroup"><h4>Standard</h4>'+grp("Standard").map(skrow).join("")+'</div>';
  h+='<div class="pm-skillgroup"><h4>Professional</h4>'+(grp("Professional").length?grp("Professional").map(skrow).join(""):'<p class="pm-empty">None.</p>')+'</div>';
  if(grp("Magic").length)h+='<div class="pm-skillgroup"><h4>Magic</h4>'+grp("Magic").map(skrow).join("")+'</div>';
  if(grp("Combat Style").length)h+='<div class="pm-skillgroup"><h4>Combat Styles</h4>'+grp("Combat Style").map(skrow).join("")+'</div>';
  h+='</div></div>';

  // -- right column: Combat readout (tiles + spendable AP/Luck/Magic + Fatigue), tabbed section, roll log --
  h+='<div class="pm-col pm-col-right">';
  h+=pmCombatBox();

  const tabs=[["actions","Actions"],["effects","Special Effects"],["inventory","Inventory"],["features","Features"],["notes","Notes"]];
  h+='<div class="pm-box" style="padding:0;overflow:hidden"><div class="pm-tabs" style="padding:0 14px;margin-top:2px">'+tabs.map(([k,l])=>'<button class="pm-tabbtn '+(tab===k?"on":"")+'" onclick="APP.playTab(\''+k+'\')">'+l+'</button>').join("")+'</div>';
  h+='<div class="pm-tabpanel" style="border:none;border-radius:0">';
  if(tab==="actions"){
    // styleTxt is built with esc() already applied per-style-name below — it
    // must be dropped straight into the HTML unescaped, or "&" etc. in a
    // style name would get double-escaped into "&amp;amp;". When there are
    // 2+ styles, showing the identical full list in every single weapon row
    // is just noise, so it's condensed to one shared legend line under the
    // table instead (the per-style roll chips already give the real numbers).
    const styleTxt=styles.length?styles.map(s=>esc(s.name)+" "+s.pct).join(", "):"No combat style yet";
    const multiStyle=styles.length>=2;
    if(S.gearWeapons.length){
      h+='<table class="pm-atktable"><tr><th>Weapon</th><th>Range/Reach</th><th>Hit %</th><th>Damage</th><th>Notes</th></tr>'
       +S.gearWeapons.map(n=>{const w=WEAPON_MAP[n];if(!w)return"";
         return '<tr><td>'+esc(w.name)+'</td><td>'+esc(w.range||w.reach||"—")+'</td><td>'+(multiStyle?"multiple &mdash; see below":styleTxt)+'</td><td>'+esc(w.dmg)+'</td><td>'+esc(w.effects||"—")+'</td></tr>';
       }).join("")+'</table>';
      if(multiStyle)h+='<p class="pm-notes" style="margin-top:6px">Combat Styles: '+styleTxt+'</p>';
    }else h+='<p class="pm-empty">No weapons carried — add some on the Money &amp; Gear step.</p>';
    if(styles.length){
      const styleEntries=stylesList();
      h+='<div class="pm-atk-styles">'+styleEntries.map(s=>{const base=finalPct(s.key);const g=gradedPct(s.key,base);const pct=g.pct===null?GRADE_LABEL[g.grade]:g.pct+"%";
        return '<span class="pm-stylechip">'+esc(s.name)+' <b onclick="APP.toggleGradePop(\''+jsq(s.key)+'\',\''+jsq(s.name)+'\',event)" title="Click for Difficulty Grades">'+pct+'</b> <button class="pm-btn roll" onclick="APP.roll(\''+jsq(s.key)+'\')">roll</button></span>';}).join("")+'</div>';
    }
  }else if(tab==="inventory"){
    h+='<table class="pm-atktable"><tr><th>Location</th><th>Armour</th><th>AP</th></tr>'
     +ARMOR_LOCATIONS.map(l=>'<tr><td>'+esc(l)+'</td><td>'+esc(S.armor[l])+'</td><td>'+armorApAt(l)+'</td></tr>').join("")+'</table>';
    h+='<p class="pm-invmeta">Gear ENC '+gearEncTotal()+' / '+(encLimit()??"—")+' unencumbered'+(S.money.dice.length?(' &middot; '+(moneyTotal()-(S.money.spent||0))+' / '+moneyTotal()+' sp'):"")+'</p>';
    if(inventoryBlock()){
      // Plain party-member view of a teammate's sheet: static list, no controls.
      if(S.inventory.length)h+='<div class="pm-invlist">'+S.inventory.map(it=>'<div class="pm-invrow"><span>'+esc(it.name)+' &times;'+it.qty+'</span><span class="pm-empty">ENC '+((it.qty||0)*(it.enc||0))+'</span></div>').join("")+'</div>';
    }else{
      // Editable for the owner always, and for the DM viewing a player's
      // character (VIEW_ONLY_IS_DM) as a narrow loot/gear exception. Deliberately
      // avoids the .pm-sbtn/.pm-pip/.pm-fatsel/.pm-dctl input classes that the
      // .view-only CSS rule disables, since this stays live under VIEW_ONLY for a DM.
      h+='<table class="pm-atktable"><tr><th>Item</th><th>Qty</th><th>ENC ea</th><th></th></tr>'
       +S.inventory.map((it,i)=>'<tr><td><input type="text" value="'+esc(it.name)+'" style="width:100%" onchange="APP.playInv('+i+',\'name\',this.value)"></td>'
        +'<td><input type="number" value="'+it.qty+'" style="width:56px" onchange="APP.playInv('+i+',\'qty\',this.value)"></td>'
        +'<td><input type="number" step="0.5" value="'+it.enc+'" style="width:56px" onchange="APP.playInv('+i+',\'enc\',this.value)"></td>'
        +'<td><button class="chip" aria-label="remove item" onclick="APP.playInvDel('+i+')">&times;</button></td></tr>').join("")
       +'</table><p style="margin-top:8px"><button class="chip" onclick="APP.playInvAdd()">+ add item</button></p>';
    }
  }else if(tab==="features"){
    h+=S.passions.length?'<div class="pm-invlist">'+S.passions.map(p=>'<div class="pm-invrow"><span>'+esc(p.name||"(unnamed)")+'</span><span class="pctval">'+passionVal(p)+'%</span></div>').join("")+'</div>':'<p class="pm-empty">No passions recorded.</p>';
  }else if(tab==="effects"){
    h+=specialEffectsPanel();
  }else{
    h+=S.concept.notes?('<p class="pm-notes">'+esc(S.concept.notes).replace(/\n/g,"<br>")+'</p>'):'<p class="pm-empty">No background notes yet.</p>';
  }
  h+='</div></div>';

  h+='<div class="pm-box pm-rolllog-wrap"><h3>Roll Log</h3>'
   +'<p class="pm-empty" style="margin-bottom:7px">Critical &le; 1/10 skill (round up) &middot; 01&ndash;05 auto success &middot; 96&ndash;00 auto failure &middot; Fumble 99&ndash;00 (00 only if skill&gt;100). A combat Fumble isn&#39;t just a miss &mdash; it can hand your opponent free Special Effects.</p>'
   +'<div class="pm-rolllog">'
   +(S.rollLog.length?S.rollLog.map((r,i)=>playRollLogRow(r,i)).join(""):'<span class="pm-empty">No rolls yet — click "roll" beside any skill.</span>')
   +'</div></div>';
  h+='</div>'; // /pm-col-right

  h+='</div>'; // /pm-columns
  h+='</div>';
  if(XP_OPEN&&!VIEW_ONLY)h+=xpModalHtml();
  $("#main").innerHTML=h;

// ---- Improve Skills modal (Experience Rolls, core rulebook pp.71-73) ----
function xpModalHtml(){
  const es=allEntries();
  const grp=g=>es.filter(e=>e.grp===g).sort((a,b)=>a.label.localeCompare(b.label));

    const pct=finalPct(e.key);

     +'<button class="pm-xpflag'+(flagged?" on":"")+'" title="'+(flagged?"Fumbled — free +1% pending. Click to remove flag.":"Mark this skill as Fumbled (free +1%)")+'" onclick="APP.xpToggleFumble(\''+jsq(e.key)+'\')">&#9873;</button>'

  if(grp("Professional").length)h+='<div class="pm-skillgroup"><h4>Professional</h4>'+grp("Professional").map(row).join("")+'</div>';
  if(grp("Magic").length)h+='<div class="pm-skillgroup"><h4>Magic</h4>'+grp("Magic").map(row).join("")+'</div>';
  if(grp("Combat Style").length)h+='<div class="pm-skillgroup"><h4>Combat Styles</h4>'+grp("Combat Style").map(row).join("")+'</div>';
  h+='</div>';
  h+='<div class="pm-xplog"><h4>Results</h4>'+(S.xp.history.length?S.xp.history.map(xpLogRow).join(""):'<p class="pm-empty">No rolls yet.</p>')+'</div>';
  h+='</div></div>';

}
function xpLogRow(r){
  if(r.type==="fumble")return '<div class="pm-xplogrow fumble">'+esc(r.label)+' — Fumble bonus <b>+1%</b> &rarr; now <b>'+r.newPct+'%</b></div>';
  return '<div class="pm-xplogrow'+(r.success?" ok":"")+'">'+esc(r.label)+' — d100 '+r.roll+' + INT '+r.int+' = <b>'+r.total+'</b> vs '+r.target+'% &rarr; '
   +(r.success?"met/beat it":"fell short")+', <b>+'+r.gain+'%</b>'+(r.fumbleApplied?" (fumble +1% applied first)":"")+' &rarr; now <b>'+r.newPct+'%</b></div>';
}
// The dense print-style character sheet. Used to be the builder's final
// step ("Sheet & Export"); now that Play Mode covers everything a player
// needs during a session, this is instead a standalone reference/printout
// reachable from Play Mode, the Finish step, and each My Characters card
// (see APPVIEW "sheet" / APP.toSheet / renderSheetView below).
function characterSheetBody(){
  const c=S.chars,es=allEntries();
  const grp=g=>es.filter(e=>e.grp===g).sort((a,b)=>a.label.localeCompare(b.label));
  // Small filled/hollow dot ahead of each skill name — purely a scannability
  // aid (not a rules concept) so a first-time player can spot at a glance

  const skrows=list=>list.map(e=>{
    const base=finalPct(e.key);const g=gradedPct(e.key,base);const shifted=g.grade!==ACTIVE_GRADE;
    let valueHtml;
    if(g.pct===null)valueHtml='<span class="note" style="text-transform:capitalize">'+GRADE_LABEL[g.grade]+'</span>';
    else if(g.grade!=="standard")valueHtml='<span class="pct">'+g.pct+'%</span> <span class="note" style="text-decoration:line-through">'+base+'%</span>'+(shifted?' <span class="note" title="Pulp/Paragon Advantage: one Grade easier">&#9733;</span>':"");
    else valueHtml='<span class="pct">'+base+'%</span>';
    const dot='<span class="trdot" style="color:'+(e.trained?"var(--verd)":"var(--faint)")+'" title="'+(e.trained?"Trained":"Base only, no points invested")+'">'+(e.trained?"&#9679;":"&#9675;")+'</span>';
    return '<div class="skrow"><span>'+dot+esc(e.label)+(e.provisional?' <span class="warn" title="Combat Style base % uses STR+DEX as a working default, same formula as Athletics/Swim/Unarmed — the book leaves each style&#39;s exact base characteristics to the Games Master/setting">&#9888;</span>':"")+'</span><span>'+valueHtml+' <button class="rollb" onclick="APP.roll(\''+jsq(e.key)+'\')">roll</button></span></div>';
  }).join("");
  let h=head("Character Sheet","A printable reference sheet — same numbers as Play Mode. Roll skills straight off it if you like; this browser autosaves as you go either way.");
  h+='<div class="card"><h3>Difficulty Grade</h3><p class="note">Shifts every skill %, and what the roll button uses, until you set it back to Standard.'
   +(S.archetype!=="ordinary"?' Endurance/Stealth/Willpower auto-shift one step easier if you took that Advantage (marked &#9733;).':"")+'</p>'
   +'<select onchange="APP.setGrade(this.value)">'+GRADES.map(([k,l])=>'<option value="'+k+'" '+(ACTIVE_GRADE===k?"selected":"")+'>'+l+'</option>').join("")+'</select>'
   +(ACTIVE_GRADE!=="standard"?' <button class="chip" onclick="APP.setGrade(\'standard\')">reset to Standard</button>':"")+'</div>';
  h+='<div class="rolllog" id="rolllog">'+(S.rollLog.length?S.rollLog.map((r,i)=>'<div class="'+(i===0?"fresh ":"")+'t'+r.tier+'">d100 = '+r.roll+' vs '+esc(r.label)+' '+r.pct+'% &rarr; <b>'+r.tier+'</b></div>').join(""):'<span class="note">Roll log &mdash; click &ldquo;roll&rdquo; beside any skill. Crit &le; 1/10 skill (round up) &middot; 01&ndash;05 auto success &middot; 96&ndash;00 auto failure &middot; fumble 99&ndash;00 (00 only if skill &gt; 100).</span>')+'</div>';
  // Dense, print-style grid sheet — modelled on the official Mythras
  // character sheet's layout (small bordered boxes, a title panel, compact
  // Characteristics/Attributes tables, a Hit Locations table with a body
  // dot-diagram, a wide Skills table, and Melee/Ranged weapon tables along

  const initPenalty=armourPenaltyToInit();
  const careerName=S.customCareer.isCustom?S.customCareer.name:S.career;
  const hpAt=loc=>{const hp=hpLocsFinal(c.CON,c.SIZ).find(x=>x[0]===loc);return hp?hp[1]:"";};
  // ---- header band: player/character, background, title panel, contacts, equipment ----
  h+='<div class="mhead-grid">';
  h+='<div class="mbox"><div class="mbox-t">Player &amp; Character</div>'
   +mkv("Player",esc(S.concept.player||"—"))+mkv("Character",esc(S.concept.name||"Unnamed"))
   +mkv("Culture",esc(S.culture||"—"))+mkv("Career",esc(careerName||"—"))
   +mkv("Age",esc(S.concept.age||"—"))+mkv("Gender",esc(S.concept.gender||"—"))
   +mkv("Frame",esc(S.concept.frame||"—"))+mkv("Handed",esc(S.concept.handed||"—"))+'</div>';
  h+='<div class="mbox"><div class="mbox-t">Background, Community &amp; Family</div>'
   +mkv("Homeland",esc(S.concept.homeland||"—"))+mkv("Social class",esc(S.money.socialClass||"—"))
   +(S.archetype!=="ordinary"?mkv("Tier",esc(ARCHETYPES[S.archetype].label)):"")
   +'<div class="mnotesmini">'+(S.concept.notes?esc(S.concept.notes):'<span class="note">No background notes yet.</span>')+'</div></div>';
  h+='<div class="mtitlepanel"><div class="logo">Mythra<span>S</span></div><div class="sub2">Character Record</div></div>';
  h+='<div class="mbox"><div class="mbox-t">Passions (Contacts, Allies &amp; Ties)</div>'
   +(S.passions.length?S.passions.map(p=>mkv(esc(p.name||"(unnamed)"),passionVal(p)+"%")).join(""):'<span class="note">None recorded.</span>')+'</div>';
  h+='<div class="mbox"><div class="mbox-t">Equipment &amp; Armour</div>'
   +'<table class="mtiny"><tr><th>Loc</th><th>Armour</th><th class="num">AP</th></tr>'
   +ARMOR_LOCATIONS.map(l=>'<tr><td>'+esc(l)+'</td><td>'+esc(S.armor[l])+'</td><td class="num">'+armorApAt(l)+'</td></tr>').join("")+'</table>'
   +mkv("Init. penalty",initPenalty?"−"+initPenalty:"0")
   +mkv("Silver",S.money.dice.length?(moneyTotal()-(S.money.spent||0))+" / "+moneyTotal()+" sp":"—")+'</div>';
  h+='</div>'; // /mhead-grid

  // ---- main grid: characteristics/attributes/money (left), hit locations +
